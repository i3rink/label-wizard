<title>Annick Bathrooms — Label Printer v1.0.6</title>
<style>
  :root {
    --blue: #5b82b4;
    --dark: #2c3e50;
    --light: #f5f7fa;
    --border: #dde3eb;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--light);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .screen-wrap {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    padding: 36px 40px 32px;
    width: 100%;
    max-width: 480px;
  }
  .screen-logo { display: block; width: 180px; margin: 0 auto 28px; }
  h1 { font-size: 1.1rem; font-weight: 600; text-align: center; color: var(--blue); margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #7a8fa6; margin-bottom: 6px; }
  input[type="text"], input[type="number"] { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 1rem; color: var(--dark); outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--blue); }
  #postcode { text-transform: uppercase; }
  .btn-print { display: block; width: 100%; margin-top: 24px; padding: 13px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-print:hover { background: #4a6e9e; }
  .note { margin-top: 14px; font-size: 0.78rem; color: #9aaab8; text-align: center; }
  .checkbox-group { margin-bottom: 16px; }
  .checkbox-group label { display: inline-flex; align-items: center; margin-right: 20px; text-transform: uppercase; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; color: #7a8fa6; cursor: pointer; }
  .checkbox-group input[type="checkbox"] { width: auto; padding: 0; margin-right: 6px; accent-color: var(--blue); }
  .label-sheet { display: none; }

  @media print {
    @page { size: 101.6mm 152.4mm portrait; margin: 0; }
    body { background: #fff; display: block; padding: 0; margin: 0; }
    .screen-wrap { display: none; }
    .label-sheet { display: block; }
    .label {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 101.6mm;
      height: 152.4mm;
      padding: 5mm 5mm 4mm;
      page-break-after: always;
    }
    .label-logo {
      width: 80mm;
      display: block;
      margin-bottom: 3mm;
    }
    .label-divider { border: none; border-top: 0.4mm solid #c0cdd8; width: 100%; margin-bottom: 0; }
    .label-body { width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; }
    .label-row { width: 100%; }
    .label-caption { font-family: Arial, sans-serif; font-size: 7pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #999; display: block; margin-bottom: 1mm; }
    .label-value { font-family: Arial, sans-serif; font-size: 30pt; font-weight: 900; color: #1a1a1a; line-height: 1; display: block; }
    .label-value.medium { font-size: 30pt; }
    .label-footer { font-family: Arial, sans-serif; font-size: 6pt; color: #bbb; text-align: center; }
    .label-delivery { width: 100%; display: flex; justify-content: space-between; margin-top: 3mm; border-top: 0.4mm solid #c0cdd8; padding-top: 2mm; }
    .label-delivery-item { display: flex; align-items: center; font-family: Arial, sans-serif; font-size: 9pt; font-weight: 700; color: #1a1a1a; }
    .label-checkbox { display: inline-block; width: 5mm; height: 5mm; border: 0.5mm solid #1a1a1a; margin-right: 1.5mm; position: relative; }
    .label-checkbox.checked::after { content: ""; position: absolute; top: 0.3mm; left: 0.3mm; width: 3.5mm; height: 3.5mm; background: #1a1a1a; }
  }
</style>

  function esc(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function buildLabel(jobId, postcode, door, chkDel, chkRem, chkColl) {
    var div = document.createElement("div");
    div.className = "label";
    div.innerHTML =
      "<img class='label-logo' src='" + LOGO + "' alt='Annick Bathrooms'>" +
      "<hr class='label-divider'>" +
      "<div class='label-body'>" +
        "<div class='label-row'>" +
          "<span class='label-caption'>Job ID</span>" +
          "<span class='label-value'>" + esc(jobId) + "</span>" +
        "</div>" +
        "<div class='label-row'>" +
          "<span class='label-caption'>Postcode</span>" +
          "<span class='label-value'>" + esc(postcode) + "</span>" +
        "</div>" +
        "<div class='label-row'>" +
          "<span class='label-caption'>Door Number</span>" +
          "<span class='label-value medium'>" + esc(door) + "</span>" +
        "</div>" +
      "</div>" +
      "<div class='label-delivery'>" +
        "<div class='label-delivery-item'><span class='label-checkbox" + (chkDel ? " checked" : "") + "'></span>DEL</div>" +
        "<div class='label-delivery-item'><span class='label-checkbox" + (chkRem ? " checked" : "") + "'></span>REM</div>" +
        "<div class='label-delivery-item'><span class='label-checkbox" + (chkColl ? " checked" : "") + "'></span>COLL</div>" +
      "</div>" +
      "<div class='label-footer'>annick-bathrooms.co.uk</div>";
    return div;
  }

  function printLabels() {
    var jobId    = document.getElementById("jobId").value.trim();
    var postcode = document.getElementById("postcode").value.trim().toUpperCase();
    var door     = document.getElementById("doorNumber").value.trim();
    var qty      = parseInt(document.getElementById("qty").value, 10) || 1;
    var chkDel   = document.getElementById("chkDel").checked;
    var chkRem   = document.getElementById("chkRem").checked;
    var chkColl  = document.getElementById("chkColl").checked;

    if (!jobId || !postcode || !door) {
      alert("Please fill in Job ID, Postcode, and Door Number before printing.");
      return;
    }

    var sheet = document.getElementById("labelSheet");
    sheet.innerHTML = "";
    for (var i = 0; i < qty; i++) {
      sheet.appendChild(buildLabel(jobId, postcode, door, chkDel, chkRem, chkColl));
    }
    sheet.style.display = "block";
    sheet.getBoundingClientRect();
    window.print();
    sheet.style.display = "none";
  }

  // Force postcode to uppercase as user types
  document.getElementById("postcode").addEventListener("input", function () {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });

  window.printLabels = printLabels;
}());
</script>
