  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.id === 'dash-pin-input') { e.preventDefault(); tryDashUnlock(); }
  });

  document.addEventListener('change', e => {
    if (e.target.id && e.target.id.startsWith('oos-expected-') && !e.target.id.includes('custom')) {
      const id = e.target.id.replace('oos-expected-', '');
      const customEl = document.getElementById(`oos-expected-custom-${id}`);
      if (customEl) customEl.style.display = e.target.value === 'custom' ? 'block' : 'none';
      return;
    }
    if (e.target.id === 'file-input') { handleFiles([...e.target.files]); return; }
    if (e.target.dataset.action === 'c4-qty-input') {
      const id  = e.target.dataset.id;
      const val = e.target.value.trim();
      queueC4Save(id, val);
      return;
    }
    if (e.target.dataset.action === 'qty-input') {
      const key = e.target.dataset.key;
      if (state.checks[key]) { state.checks[key].haveQty = Number(e.target.value); pushCheck(key); }
      return;
    }
    if (e.target.dataset.action === 'c2-qty') {
      const key    = e.target.dataset.key;
      const jobRef = state.c2.selectedJob;
      if (!jobRef) return;
      if (!state.c2.picks[jobRef]) state.c2.picks[jobRef] = {};
      const val = e.target.value.trim();
      state.c2.picks[jobRef][key] = { qty: val === '' ? null : Number(val) };
      render(); return;
    }
    if (e.target.dataset.action === 'c3-qty') {
      const key = e.target.dataset.key;
      if (state.c3.delivered[key]) {
        state.c3.delivered[key].deliveredQty = e.target.value === '' ? undefined : Number(e.target.value);
      }
      return;
    }
  });

  /* ═══════════════════════════════════════════════
     GOOGLE DRIVE PICKER
  ═══════════════════════════════════════════════ */
  function loadPickerApi() {
    return new Promise(resolve => {
      if (state.pickerApiLoaded) { resolve(); return; }
      gapi.load('picker', () => { state.pickerApiLoaded = true; resolve(); });
    });
  }

  function getOAuthToken() {
    return new Promise((resolve, reject) => {
      if (state.driveToken) { resolve(state.driveToken); return; }
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: resp => {
          if (resp.error) { reject(resp.error); return; }
          state.driveToken = resp.access_token; state.driveAuthed = true;
          /* do NOT render() here — it wipes the DOM mid-flow on mobile
             before the picker can open. Status dot updates on next natural render. */
          resolve(resp.access_token);
        },
      });
      tokenClient.requestAccessToken({ prompt: state.driveAuthed ? '' : 'consent' });
    });
  }

  function showPicker(token) {
    return new Promise(resolve => {
      const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
        .setMimeTypes('application/pdf').setMode(google.picker.DocsViewMode.LIST);
      const picker = new google.picker.PickerBuilder()
        .setAppId(GOOGLE_APP_ID).setOAuthToken(token).setDeveloperKey(GOOGLE_API_KEY)
        .addView(view).setTitle('Select packing slip PDFs')
        .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
        .setCallback(data => {
          if (data.action === google.picker.Action.PICKED)  resolve(data.docs);
          else if (data.action === google.picker.Action.CANCEL) resolve([]);
        }).build();
      picker.setVisible(true);
    });
  }

  async function downloadDriveFile(fileId, token) {
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
    if (!resp.ok) throw new Error(`Drive download failed: ${resp.status}`);
    return resp.blob();
  }

  async function handleDrivePick() {
    try {
      await loadPickerApi();
      const token = await getOAuthToken();
      const docs  = await showPicker(token);
      if (!docs.length) return;
      toast(`Downloading ${docs.length} file${docs.length > 1 ? 's' : ''} from Drive\u2026`, 5000);
      const files = await Promise.all(docs.map(async doc => {
        const blob = await downloadDriveFile(doc.id, token);
        return new File([blob], doc.name, { type: 'application/pdf' });
      }));
      /* Store Drive metadata for PDF links */
      docs.forEach(doc => {
        if (!state.driveFileDocs.find(d => d.id === doc.id)) {
          state.driveFileDocs.push({ id: doc.id, name: doc.name });
        }
      });
      handleFiles(files);
    } catch (err) {
      console.error('Drive pick error:', err);
      if (String(err).includes('401') || String(err).includes('invalid_token')) {
        state.driveToken = null; state.driveAuthed = false;
        toast('Drive session expired \u2014 please sign in again'); render();
      } else { toast('Could not load from Google Drive. Try again.'); }
    }
  }

  /* ═══════════════════════════════════════════════
     FILE HANDLING + PDF PARSING
  ═══════════════════════════════════════════════ */
  /* handleFiles — adds incoming files to the staging queue, deduplicating by name.
     Nothing is parsed or submitted until the user hits "Create Session". */
  async function handleFiles(files) {
    if (!files.length) return;
    const existing = new Set(state.stagedFiles.map(f => f.name));
    for (const f of files) {
      if (!existing.has(f.name)) { state.stagedFiles.push(f); existing.add(f.name); }
    }
    render();
  }

  /* processStaged — parse all staged files, check for duplicates, then create session. */
  async function processStaged() {
    const files = state.stagedFiles;
    if (!files.length) { toast('No files queued'); return; }
    const prog = document.getElementById('parse-progress');
    if (prog) prog.style.display = '';
    const jobObjs = [];
    for (let i = 0; i < files.length; i++) {
      setProgress(Math.round(i / files.length * 70), `Parsing ${files[i].name}\u2026`);
      try { jobObjs.push(await parseFile(files[i])); }
      catch (err) { console.error('Parse error:', files[i].name, err); toast(`Could not parse ${files[i].name}`); }
    }

    /* ── Duplicate check: query sessions for any matching job ref ── */
    setProgress(80, 'Checking for duplicates\u2026');
    const warnings = [];
    const { data: allSessions } = await sb.from('sessions').select('id, code, jobs, created_at').order('created_at', { ascending: false }).limit(100);
    for (const job of jobObjs) {
      const quoteRef = job.id; /* e.g. Q1785 */
      const match = (allSessions || []).find(s =>
        (s.jobs || []).some(j => String(j).toUpperCase() === String(quoteRef).toUpperCase())
      );
      if (match) {
        const dateStr = new Date(match.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        warnings.push({ quoteRef, existingCode: match.code, existingDate: dateStr, existingId: match.id });
      }
    }

    if (warnings.length) {
      setProgress(100, 'Done');
      state.dupWarnings = warnings;
      state.dupPendingJobObjs = jobObjs;
      render(); return;
    }

    setProgress(90, 'Consolidating\u2026');
    const masterList = buildMasterList(jobObjs);
    setProgress(100, 'Done!');
    const session = await createSession(masterList, jobObjs.map(j => j.id));
    state.session = session; state.checks = {};
    state.stagedFiles = [];
    state.dupWarnings = [];
    state.view = 'session';
    setTimeout(() => render(), 400);
  }

  function setProgress(pct, label) {
    const fill = document.getElementById('progress-fill');
    const lbl  = document.getElementById('progress-label');
    if (fill) fill.style.width = pct + '%';
    if (lbl)  lbl.textContent  = label;
  }

  async function extractPdfText(file) {
    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    let full = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page    = await pdf.getPage(p);
      const content = await page.getTextContent();
      const sorted  = content.items.slice().sort((a, b) => {
        const dy = b.transform[5] - a.transform[5];
        return Math.abs(dy) > 3 ? dy : a.transform[4] - b.transform[4];
      });
      const lines = []; let cur = [], lastY = null;
      for (const item of sorted) {
        const y = Math.round(item.transform[5]);
        if (lastY === null || Math.abs(y - lastY) > 3) {
          if (cur.length) lines.push(cur.map(i => i.str).join(' ').trim());
          cur = [item]; lastY = y;
        } else cur.push(item);
      }
      if (cur.length) lines.push(cur.map(i => i.str).join(' ').trim());
      full += lines.join('\n') + '\n';
    }
    return full;
  }

  async function parseFile(file) { return parsePackingSlip(await extractPdfText(file), file.name); }

  const ITEM_RE  = /^(\d+)\.\s+(.+?)\s{2,}(\d+(?:\.\d+)?)\s*(pcs|bundle|box|pk|2pk|3pk|4pk|pair|roll|m|lm|set|kit|each|no\.?|nr\.?)?$/i;
  const ITEM_RE2 = /^(\d+)\.\s+(.+)\s+(\d+(?:\.\d+)?)\s*(pcs|bundle|box|pk|2pk|3pk|4pk|pair|roll|m|lm|set|kit|each)?$/i;
  const SKU_RE   = /^[A-Z0-9][A-Z0-9\-_]{2,}$/i;
  const BUNDLE_KW = /\bkit\b|\bbundle\b/i;
  const SUB_RE   = /^(\d+)x\s+(.+)$/i;
  const SKIP_RE  = /mull collection supply|bute collection supply/i;

  function normaliseUnit(u) {
    u = u.toLowerCase().trim();
    if (!u || u === 'no' || u === 'nr') return 'pcs';
    if (u === '2pk') return '2-pack'; if (u === '3pk') return '3-pack'; if (u === '4pk') return '4-pack';
    return u;
  }

  function parsePackingSlip(text, filename) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    let jobId   = filename.replace(/\.pdf$/i, '');
    const qm    = text.match(/Quote\s*#\s*(\S+)/i);
    if (qm) jobId = `Q${qm[1]}`;
    const items = []; let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      const m    = line.match(ITEM_RE) || line.match(ITEM_RE2);
      if (m) {
        const name = m[2].trim(); const qty = parseFloat(m[3]); const unit = normaliseUnit(m[4] || '');
        let j = i + 1, sku = '';
        if (j < lines.length && SKU_RE.test(lines[j]) && !/^\d+\.\s/.test(lines[j])) { sku = lines[j].toUpperCase(); j++; }
        if (SKIP_RE.test(name)) { while (j < lines.length && !/^\d+\.\s/.test(lines[j])) j++; i = j; continue; }
        if (BUNDLE_KW.test(name) || BUNDLE_KW.test(unit)) {
          const subs = [];
          while (j < lines.length && !/^\d+\.\s/.test(lines[j])) {
            const sm = lines[j].trim().match(SUB_RE);
            if (sm && sm[2].trim().length > 1) subs.push({ name: sm[2].trim(), sku: '', qty: parseInt(sm[1]) * qty, unit: 'pcs', fromBundle: `${name}${sku ? ' (' + sku + ')' : ''}` });
            j++;
          }
          if (subs.length) subs.forEach(s => items.push(s)); else items.push({ name, sku, qty, unit, fromBundle: null });
        } else { items.push({ name, sku, qty, unit, fromBundle: null }); }
        i = j; continue;
      }
      i++;
    }
    return { id: jobId, name: jobId, filename, items };
  }

  /* ── FIX: buildMasterList stores jobQtys so M2/M3 can show per-slip quantities ── */
  function buildMasterList(jobs) {
    const map = new Map();
    jobs.forEach(job => {
      job.items.forEach(item => {
        const key = item.sku ? item.sku.toUpperCase() : item.name.toLowerCase();
        if (map.has(key)) {
          const ex = map.get(key);
          ex.qty += item.qty;
          if (!ex.jobs.includes(job.id)) ex.jobs.push(job.id);
          /* accumulate per-job qty for M2/M3 — does not affect M1 consolidated qty */
          ex.jobQtys[job.id] = (ex.jobQtys[job.id] || 0) + item.qty;
        } else {
          map.set(key, {
            key,
            name: item.name,
            sku: item.sku || '',
            qty: item.qty,
            unit: item.unit,
            fromBundle: item.fromBundle || null,
            jobs: [job.id],
            jobQtys: { [job.id]: item.qty },
          });
        }
      });
    });
    return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
  }

  /* ═══════════════════════════════════════════════
     SUPABASE — M1 sessions & checks
  ═══════════════════════════════════════════════ */
  /* appendToSession — parse files, check for dupe jobs, show banner or proceed */
  async function appendToSession() {
    const target = state.appendTarget;
    const files  = state.stagedFiles;
    if (!target || !files.length) { toast('Load a session and upload PDFs first'); return; }

    const prog = document.getElementById('parse-progress');
    if (prog) prog.style.display = '';

    /* Parse new files */
    const newJobObjs = [];
    for (let i = 0; i < files.length; i++) {
      setProgress(Math.round(i / files.length * 70), `Parsing ${files[i].name}…`);
      try { newJobObjs.push(await parseFile(files[i])); }
      catch (err) { console.error('Parse error:', files[i].name, err); toast(`Could not parse ${files[i].name}`); }
    }
    if (!newJobObjs.length) { toast('No files parsed successfully'); if (prog) prog.style.display = 'none'; return; }

    /* Job-level dupe check — show styled banner, do not proceed silently */
    const existingJobSet = new Set((target.jobs || []).map(j => String(j).toUpperCase().trim()));
    const dupJobs = newJobObjs.filter(j => existingJobSet.has(String(j.id).toUpperCase().trim()));
    if (dupJobs.length) {
      if (prog) prog.style.display = 'none';
      state.appendDupWarnings    = dupJobs.map(j => j.id);
      state.appendPendingJobObjs = newJobObjs;
      render(); return;
    }

    await doAppendMerge(newJobObjs);
  }

  /* doAppendMerge — the actual merge+save, called after dupe check passes */
  async function doAppendMerge(newJobObjs) {
    const target = state.appendTarget;
    const prog = document.getElementById('parse-progress');
    if (prog) prog.style.display = '';

    setProgress(85, 'Merging into existing session…');

    /* Reconstruct existing items per-job from jobQtys so re-appending a job
       doesn't double-count. Each original job becomes its own job-like object
       with only its own quantities, matching what buildMasterList expects.    */
    const existingJobIds = [...new Set(
      target.masterList.flatMap(i => Object.keys(i.jobQtys || {}))
    )];

    const existingJobObjs = existingJobIds.length
      ? existingJobIds.map(jobId => ({
          id: jobId,
          items: target.masterList
            .filter(i => i.jobQtys && i.jobQtys[jobId] != null)
            .map(i => ({
              name: i.name ? i.name.trim() : i.name,
              sku:  i.sku  ? i.sku.trim()  : '',
              qty:  i.jobQtys[jobId],
              unit: i.unit || '',
              fromBundle: i.fromBundle || null,
            })),
        }))
      : [{
          /* fallback: no jobQtys stored — treat whole list as one existing block */
          id: '__existing__',
          items: target.masterList.map(i => ({
            name: i.name ? i.name.trim() : i.name,
            sku:  i.sku  ? i.sku.trim()  : '',
            qty:  i.qty,
            unit: i.unit || '',
            fromBundle: i.fromBundle || null,
          })),
        }];

    /* Remove jobs being re-appended from the existing set so their quantities
       come entirely from the fresh PDF, not the old stored value + new value  */
    const incomingIds = new Set(newJobObjs.map(j => String(j.id).toUpperCase().trim()));
    const baseJobObjs = existingJobObjs.filter(j => !incomingIds.has(String(j.id).toUpperCase().trim()));

    /* Build merged master list */
    const merged = buildMasterList([...baseJobObjs, ...newJobObjs]);

    /* Merge job refs */
    const newJobIds = newJobObjs.map(j => j.id);
    const mergedJobs = [...new Set([...target.jobs, ...newJobIds])];

    /* Update session in Supabase */
    setProgress(95, 'Saving…');
    const { error } = await sb.from('sessions').update({
      master_list: merged,
      jobs: mergedJobs,
    }).eq('id', target.id);

    if (error) {
      console.error(error);
      toast('⚠ Could not save — check your connection');
      return;
    }

    setProgress(100, 'Done!');
    toast(`✓ ${newJobObjs.length} slip${newJobObjs.length !== 1 ? 's' : ''} merged into session ${target.code}`);

    /* Load the updated session */
    state.session = { id: target.id, code: target.code, masterList: merged, jobs: mergedJobs };
    state.checks  = {};
    state.stagedFiles  = [];
    state.appendTarget = null;
    state.view = 'session';
    setTimeout(() => render(), 400);
  }

  async function createSession(masterList, jobs) {
    const code = generateCode();
    const sourceFiles = (state.driveFileDocs || []).map(d => ({ id: d.id, name: d.name, url: `https://drive.google.com/file/d/${d.id}/view` }));
    const { data, error } = await sb.from('sessions').insert({ code, master_list: masterList, jobs, source_files: sourceFiles.length ? sourceFiles : null, created_at: new Date().toISOString() }).select().single();
    if (error) { console.error(error); toast('Could not save session \u2014 working offline'); return { id: 'local', code, masterList, jobs }; }
    subscribeToChecks(data.id);
    return { id: data.id, code, masterList, jobs, sourceFiles: data.source_files || [] };
  }

  async function joinSession(code) {
    const tryCode = async (c) => sb.from('sessions').select('*').eq('code', c).single();
    let { data, error } = await tryCode(code);
    if (error || !data) {
      const dashed = code.replace(/^(AB)(\d{4})(.+)$/, '$1-$2-$3');
      if (dashed !== code) { const r = await tryCode(dashed); data = r.data; error = r.error; }
    }
    if (error || !data) { toast('Session not found \u2014 check the code'); return; }
    state.session = { id: data.id, code: data.code, masterList: data.master_list, jobs: data.jobs };
    state.checks  = {}; state.role = 'warehouse'; state.view = 'check';
    const { data: ec } = await sb.from('checks').select('*').eq('session_id', data.id).order('updated_at', { ascending: false });
    if (ec) {
      const ml = data.master_list || [];
      const ntk = new Map();
      for (const item of ml) {
        ntk.set(String(item.key).toLowerCase().trim(), item.key);
        if (item.sku) ntk.set(String(item.sku).toLowerCase().trim(), item.key);
        ntk.set(String(item.name).toLowerCase().trim(), item.key);
      }
      const seen = new Set();
      for (const c of ec) {
        if (!c.status || c.status === 'unchecked') continue;
        const rk = ntk.get(String(c.item_key).toLowerCase().trim()) || c.item_key;
        if (!seen.has(rk)) { seen.add(rk); state.checks[rk] = { status: c.status, haveQty: c.have_qty }; }
      }
    }
    subscribeToChecks(data.id); render();
  }

  function subscribeToChecks(sessionId) {
    sb.channel('checks-' + sessionId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'checks', filter: `session_id=eq.${sessionId}` }, payload => {
        const c = payload.new;
        if (c.status && c.status !== 'unchecked') state.checks[c.item_key] = { status: c.status, haveQty: c.have_qty };
        if (state.view === 'check') render();
      }).subscribe();
  }

  async function setStatus(key, status) {
    if (state.checks[key]?.status === status) { delete state.checks[key]; } else { state.checks[key] = { status }; }
    render(); await pushCheck(key);
  }

  async function submitAllChecks() {
    const btn = document.getElementById('submit-all-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }
    if (!state.session?.id || state.session.id === 'local') {
      toast('No active session — nothing to submit'); if (btn) { btn.disabled = false; btn.innerHTML = '&#10003; Submit'; } return;
    }
    const items = state.session.masterList;
    const checked = items.filter(i => state.checks[i.key]?.status);
    if (!checked.length) {
      toast('No items checked yet — tap items first');
      if (btn) { btn.disabled = false; btn.innerHTML = '&#10003; Submit'; } return;
    }
    try {
      const rows = checked.map(item => ({
        session_id: state.session.id,
        item_key:   item.key,
        status:     state.checks[item.key].status,
        have_qty:   state.checks[item.key].haveQty || null,
      }));
      const { error } = await sb.from('checks').upsert(rows, { onConflict: 'session_id,item_key' });
      if (error) throw error;
      toast('✓ Saved — ' + rows.length + ' item' + (rows.length !== 1 ? 's' : '') + ' recorded in Supabase', 4000);
    } catch (err) {
      console.error('submitAllChecks error:', err);
      toast('⚠ Save failed — check your connection and try again', 5000);
    }
    if (btn) { btn.disabled = false; btn.innerHTML = '&#10003; Submit'; }
  }

  async function pushCheck(key) {
    if (!state.session?.id || state.session.id === 'local') return;
    const c = state.checks[key];
    await sb.from('checks').upsert(
      { session_id: state.session.id, item_key: key, status: c?.status || null, have_qty: c?.haveQty || null, updated_at: new Date().toISOString() },
      { onConflict: 'session_id,item_key' }
    );
  }

  /* ═══════════════════════════════════════════════
     SNAKE BACKGROUND ANIMATION
  ═══════════════════════════════════════════════ */
  function startSnake() {
    stopSnake();
    const canvas = document.getElementById('snake-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const G = 24;

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const cols = Math.ceil(canvas.width  / G) + 1;
    const rows = Math.ceil(canvas.height / G) + 1;

    const mx = Math.floor(cols / 2);
    const my = Math.floor(rows / 2);
    let body = Array.from({ length: 10 }, (_, i) => ({ x: mx - i, y: my }));
    let vx = 1, vy = 0;
    let pending = 0;

    let lastStep = 0, lastTurn = 0;
    const STEP   = 280;
    let nextTurn = 1800 + Math.random() * 2000;

    function wrap(v, max) { return ((v % max) + max) % max; }

    function loop(now) {
      if (!document.getElementById('snake-canvas')) { snakeAnimId = null; return; }

      if (now - lastStep >= STEP) {
        lastStep = now;
        const h = body[0];
        body.unshift({ x: wrap(h.x + vx, cols), y: wrap(h.y + vy, rows) });
        if (pending > 0) { pending--; } else { body.pop(); }
        if (body.length < 40 && Math.random() < 0.06) pending += 2;
      }

      if (now - lastTurn >= nextTurn) {
        lastTurn   = now;
        nextTurn   = 1500 + Math.random() * 2200;
        const opts = [[1,0],[-1,0],[0,1],[0,-1]]
          .filter(([dx,dy]) => !(dx === -vx && dy === -vy));
        [vx, vy]   = opts[Math.floor(Math.random() * opts.length)];
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      body.forEach((seg, i) => {
        const fade  = 1 - i / body.length;
        const alpha = fade * 0.52 + 0.04;
        const r     = i === 0 ? 5 : 3.5;
        ctx.beginPath();
        ctx.arc(seg.x * G, seg.y * G, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100,116,139,${alpha.toFixed(2)})`;
        ctx.fill();
      });

      snakeAnimId = requestAnimationFrame(loop);
    }

    snakeAnimId = requestAnimationFrame(loop);
  }

  function stopSnake() {
    if (snakeAnimId) { cancelAnimationFrame(snakeAnimId); snakeAnimId = null; }
    const c = document.getElementById('snake-canvas');
    if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
  }

  /* ═══════════════════════════════════════════════
     HOME DASHBOARD
  ═══════════════════════════════════════════════ */
  const DASH_PIN = '1690';

  function renderDashLock() {
    return `
      <div class="dash-section" style="text-align:center;padding:24px 20px;">
        <div style="font-size:1.4rem;margin-bottom:8px;">&#128274;</div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:4px;">Admin only</div>
        <div class="text-muted text-sm" style="margin-bottom:16px;">Enter your PIN to view pending actions.</div>
        <div style="display:flex;gap:8px;justify-content:center;align-items:center;">
          <input id="dash-pin-input" type="tel" inputmode="numeric" maxlength="4"
            placeholder="&#9679;&#9679;&#9679;&#9679;"
            style="width:90px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:1.2rem;text-align:center;outline:none;letter-spacing:.15em;" />
          <button class="btn btn-primary" data-action="dash-unlock">Unlock</button>
        </div>
        <div id="dash-pin-error" style="color:var(--red);font-size:.8rem;margin-top:10px;min-height:18px;"></div>
      </div>`;
  }

  function tryDashUnlock() {
    const input = document.getElementById('dash-pin-input');
    if (!input) return;
    if (input.value.trim() === DASH_PIN) {
      state.dashUnlocked = true;
      const el = document.getElementById('dashboard');
      if (el) el.innerHTML = '<div class="dash-loading">Loading&#8230;</div>';
      const heading = document.querySelector('.dash-heading');
      if (heading) heading.innerHTML =
        '<span class="dash-heading-title">Pending actions</span>' +
        '<button class="btn btn-ghost" data-action="dash-refresh" style="padding:6px 12px;font-size:.78rem;">&#8635; Refresh</button>';
      loadDashboard();
    } else {
      const err = document.getElementById('dash-pin-error');
      if (err) err.textContent = 'Incorrect PIN \u2014 try again';
      input.value = '';
      input.focus();
    }
  }

  async function loadDashboard() {
    const el = document.getElementById('dashboard');
    if (!el) return;
    try {
      const { data: picks } = await sb.from('pick_completions')
        .select('*').gt('shortfall', 0).order('updated_at', { ascending: false }).limit(200);

      const { data: delivs } = await sb.from('deliveries')
        .select('*').gt('shortfall', 0).order('updated_at', { ascending: false }).limit(200);

      const { data: shortChecks } = await sb.from('checks')
        .select('*').in('status', ['short', 'part'])
        .order('updated_at', { ascending: false }).limit(300);

      let m1 = [];
      if (shortChecks && shortChecks.length) {
        const sessIds = [...new Set(shortChecks.map(c => c.session_id))].slice(0, 8);
        const { data: sessions } = await sb.from('sessions')
          .select('id, code, master_list').in('id', sessIds).neq('archived', true);
        (sessions || []).forEach(sess => {
          const sessChecks = shortChecks.filter(c => c.session_id === sess.id);
          const mlMap = new Map((sess.master_list || []).map(i => [String(i.key), i]));
          const items = sessChecks.map(c => {
            const item = mlMap.get(String(c.item_key)) || {};
            const have = c.status === 'part' ? (Number(c.have_qty) || 0) : 0;
            const needed = Number(item.qty) || 0;
            return { name: item.name || c.item_key, sku: item.sku || '', needed, have, toOrder: needed - have };
          }).filter(i => i.toOrder > 0);
          if (items.length) m1.push({ code: sess.code, items });
        });
      }

      const m2Map = new Map();
      (picks || []).forEach(r => {
        const job = displayJobRef(r.job_ref) || r.job_ref;
        if (!m2Map.has(job)) m2Map.set(job, []);
        m2Map.get(job).push(r);
      });

      const m3Map = new Map();
      (delivs || []).forEach(r => {
        const job = displayJobRef(r.job_ref) || r.job_ref;
        if (!m3Map.has(job)) m3Map.set(job, []);
        m3Map.get(job).push(r);
      });

      /* ── Alternatives pending review ── */
      const { data: alts } = await sb.from('alternatives')
        .select('*').eq('status', 'pending').order('updated_at', { ascending: false }).limit(100);

      /* ── Stock checker summary ── */
      const { data: stockRows } = await sb.from('stock_items').select('*');
      const stock = stockRows || [];
      const stockCounted = stock.filter(i => i.current_qty !== null && i.current_qty !== undefined).length;
      const stockLow = stock.filter(i =>
        i.current_qty !== null && i.current_qty !== undefined &&
        i.low_stock_qty !== null && i.low_stock_qty !== undefined &&
        Number(i.current_qty) <= Number(i.low_stock_qty));
      const stockBackorder = stock.filter(i => !!i.backorder_until);

      state.dash = {
        loading: false, m1, m2: [...m2Map.entries()], m3: [...m3Map.entries()], alts: alts || [],
        stockTotal: stock.length, stockCounted, stockLow, stockBackorder, stockAll: stock,
      };
      el.innerHTML = renderDashboardContent();
    } catch (err) {
      console.error('Dashboard error:', err);
      if (el) el.innerHTML = '<p class="dash-loading">Could not load pending actions.</p>';
    }
  }

  function renderStockDashSection() {
    const { stockTotal, stockCounted, stockLow, stockBackorder } = state.dash;
    if (!stockTotal) return '';
    const lowRows = (stockLow || []).map(i => `
      <div class="dash-item">
        <div class="dash-item-name">${esc(i.name)}</div>
        ${i.sku ? `<span class="dash-item-detail">${esc(i.sku)}</span>` : ''}
        <span class="dash-item-short">${i.current_qty} in stock &mdash; min ${i.low_stock_qty}</span>

  function addMonthsLabel(n) {
    const d = new Date();
    d.setMonth(d.getMonth() + n);
    return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  }

  async function confirmOosMark(id) {
    const sel = document.getElementById(`oos-expected-${id}`);
    const customEl = document.getElementById(`oos-expected-custom-${id}`);
    const choice = sel ? sel.value : '1m';
    let label = '';
    let dateVal = null;
    if (choice === '1m') { label = `Expected ${addMonthsLabel(1)}`; }
    else if (choice === '2m') { label = `Expected ${addMonthsLabel(2)}`; }
    else if (choice === '3m') { label = `Expected ${addMonthsLabel(3)}`; }
    else if (choice === 'never') { label = 'Never \u2014 end of line'; }
    else if (choice === 'custom') { label = (customEl ? customEl.value.trim() : '') || 'Date to be confirmed'; }
    const { error } = await sb.from('stock_items').update({
      out_of_stock: true, oos_expected_date: dateVal, oos_expected_label: label,
    }).eq('id', id);
    if (error) { toast('Save failed — check connection'); return; }
    const item = (state.dash.stockAll || []).find(i => i.id === id);
    if (item) { item.out_of_stock = true; item.oos_expected_date = dateVal; item.oos_expected_label = label; }
    state.dash.oosMarkFormId = null;
    toast('Marked out of stock');
    const dashEl = document.getElementById('dashboard');
    if (dashEl) dashEl.innerHTML = renderDashboardContent();
  }

  async function saveStockAddItem() {
    const catEl  = document.getElementById('stock-add-cat');
    const subEl  = document.getElementById('stock-add-sub');
    const skuEl  = document.getElementById('stock-add-sku');
    const nameEl = document.getElementById('stock-add-name');
    const lowEl  = document.getElementById('stock-add-low');
    const errEl  = document.getElementById('stock-add-error');
    const name = nameEl ? nameEl.value.trim() : '';
    if (!name) { if (errEl) errEl.textContent = 'Product name is required'; return; }
    const row = {
      category:      catEl ? catEl.value : 'wall_floor',
      sub_category:  subEl && subEl.value.trim() ? subEl.value.trim() : null,
      sku:           skuEl && skuEl.value.trim() ? skuEl.value.trim() : null,
      name,
      low_stock_qty: lowEl && lowEl.value !== '' ? Number(lowEl.value) : null,
    };
    const { error } = await sb.from('stock_items').insert(row);
    if (error) { if (errEl) errEl.textContent = 'Save failed — check connection'; return; }
    state.dash.addItemOpen = false;
    toast('Item added');
    await loadDashboard();
  }

  /* ── Shared send helper: share sheet if available, clipboard fallback ── */
  function shareOrCopy(title, text, btnAction) {
    function flashBtn(ok) {
      const btn = document.querySelector(`[data-action="${btnAction}"]`);
      if (!btn) return;
      const orig = btn.innerHTML;
      btn.innerHTML = ok ? '&#10003; Sent!' : '&#10003; Copied!';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
    }
    if (navigator.share) {
      navigator.share({ title, text })
        .then(() => flashBtn(true))
        .catch(err => {
          /* User cancelled or share failed — fall back to clipboard silently */
          if (err.name !== 'AbortError') {
            navigator.clipboard.writeText(text).then(() => flashBtn(false)).catch(() => toast('Could not copy'));
          }
        });
    } else {
      navigator.clipboard.writeText(text).then(() => flashBtn(false)).catch(() => toast('Could not copy'));
    }
  }

  function normJobRef(j) {
    if (typeof j === 'string' && j.length) return j;
    if (j && typeof j === 'object') {
      return j.id || j.job_ref || j.code || j.jobName ||
             (j.filename ? j.filename.replace(/\.pdf$/i, '') : null) ||
             JSON.stringify(j);
    }
    return String(j);
  }

  function displayJobRef(ref) {
    if (!ref) return ref;
    const stripped = ref.replace(/^Q/i, '');
    const m = stripped.match(/^(\d+)/);
    return m ? m[1] : stripped;
  }

  async function loadC2Session() {
    const el = document.getElementById('c2-code');
    if (!el) return;
    const code = el.value.trim().toUpperCase().replace(/[\s\-]/g, '');
    if (!code) { toast('Enter a session code'); return; }
    state.c2.loading = true; render();
    const tryCode = async (c) => sb.from('sessions').select('*').eq('code', c).single();
    let { data, error } = await tryCode(code);
    if (error || !data) {
      const dashed = code.replace(/^(AB)(\d{4})(.+)$/, '$1-$2-$3');
      if (dashed !== code) { const r = await tryCode(dashed); data = r.data; error = r.error; }
    }
    state.c2.loading = false;
    if (error || !data) { toast('Session not found \u2014 check the code'); render(); return; }
    const masterList = (data.master_list || []).map(item => ({
      ...item,
      jobs: (item.jobs || []).map(normJobRef),
      /* preserve jobQtys if stored, otherwise fall back gracefully */
      jobQtys: item.jobQtys || {},
    }));
    const jobSet = new Set();
    masterList.forEach(item => (item.jobs || []).forEach(j => jobSet.add(j)));
    if (jobSet.size === 0) (data.jobs || []).forEach(j => jobSet.add(normJobRef(j)));
    const jobs = [...jobSet].sort();
    state.c2.session = { id: data.id, code: data.code, masterList, jobs };
    const { data: existing } = await sb.from('pick_completions').select('*').eq('session_id', data.id);
    if (existing && existing.length) {
      existing.forEach(row => {
        if (!state.c2.picks[row.job_ref]) state.c2.picks[row.job_ref] = {};
        if (!state.c2.picks[row.job_ref][row.item_key]) {
          state.c2.picks[row.job_ref][row.item_key] = { qty: row.picked_qty };
        }
      });
    }
    state.view = 'c2-jobs'; render();
  }

  async function submitC2Picks() {
    const s      = state.c2.session;
    const jobRef = state.c2.selectedJob;
    const picks  = state.c2.picks[jobRef] || {};
    const items  = s.masterList.filter(i => i.jobs && i.jobs.includes(jobRef));

    const rows = items.map(item => {
      const p = picks[item.key];
      /* ── FIX: use per-job qty as the baseline for shortfall calc ── */
      const neededQty = (item.jobQtys && item.jobQtys[jobRef] != null)
        ? item.jobQtys[jobRef]
        : item.qty;
      const pickedQty = (p && p.qty !== null && p.qty !== undefined) ? Number(p.qty) : neededQty;
      const shortfall  = Math.max(0, neededQty - pickedQty);
      return {
        session_id:   s.id,
        job_ref:      jobRef,
        item_key:     item.key,
        item_name:    item.name,
        needed_qty:   neededQty,
        picked_qty:   pickedQty,
        shortfall,
        updated_at:   new Date().toISOString(),
      };
    });

    const { error: delErr } = await sb.from('pick_completions').delete()
      .eq('session_id', s.id).eq('job_ref', jobRef);
    if (delErr) { console.error('M2 delete error:', delErr); toast('Save failed: ' + (delErr.message || 'unknown error')); return; }

    const { error } = await sb.from('pick_completions').insert(rows);
    if (error) { console.error('M2 insert error:', error); toast('Save failed: ' + (error.message || 'unknown error')); return; }

    if (!state.c2.picks[jobRef]) state.c2.picks[jobRef] = {};
    rows.forEach(r => { state.c2.picks[jobRef][r.item_key] = { qty: r.picked_qty }; });

    state.view = 'c2-done'; render();
  }

  function copyC2Shortfall() {
    const s      = state.c2.session;
    const jobRef = state.c2.selectedJob;
    const picks  = state.c2.picks[jobRef] || {};
    const items  = s.masterList.filter(i => i.jobs && i.jobs.includes(jobRef));
    const shorts = items.filter(i => {
      const p = picks[i.key];
      if (!p || p.qty === null || p.qty === undefined) return false;
      const needed = (i.jobQtys && i.jobQtys[jobRef] != null) ? i.jobQtys[jobRef] : i.qty;
      return Number(p.qty) < needed;
    });
    if (!shorts.length) { toast('Nothing short'); return; }
    const lines = [
      'ANNICK BATHROOMS \u2014 PICK SHORTFALL',
      `Session: ${s.code}  Job: ${jobRef}`,
      `Generated: ${new Date().toLocaleString('en-GB')}`, '',
      'Item | SKU | Needed | Picked | Short', '\u2500'.repeat(60),
      ...shorts.map(i => {
        const p = picks[i.key];
        const needed = (i.jobQtys && i.jobQtys[jobRef] != null) ? i.jobQtys[jobRef] : i.qty;
        return `${i.name} | ${i.sku || ''} | ${needed} | ${p.qty} | ${needed - Number(p.qty)}`;
      }),
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(() => toast('Shortfall copied!'));
  }

  /* ═══════════════════════════════════════════════
     SUPABASE — M3 driver delivery
  ═══════════════════════════════════════════════ */
  async function loadC3Job() {
    const jobEl    = document.getElementById('c3-job');
    const driverEl = document.getElementById('c3-driver');
    if (!jobEl) return;
    const raw = jobEl.value.trim();
    if (!raw) { toast('Enter a job reference'); return; }
    const jobNum = displayJobRef(raw.replace(/^Q/i, '').trim()) || raw.trim();
    state.c3.jobRef     = jobNum;
    state.c3.driverName = driverEl ? driverEl.value.trim() : '';
    state.c3.loading    = true; render();

    const { data: allPicks } = await sb.from('pick_completions').select('*')
      .order('updated_at', { ascending: false }).limit(500);
    const pickData = (allPicks || []).filter(r => displayJobRef(r.job_ref) === jobNum);

    if (pickData.length > 0) {
      const seen = new Map();
      pickData.forEach(row => {
        if (!seen.has(row.item_key) || row.updated_at > seen.get(row.item_key).updated_at) seen.set(row.item_key, row);
      });
      state.c3.items   = [...seen.values()].map(r => ({ key: r.item_key, name: r.item_name, sku: '', qty: r.picked_qty, unit: 'pcs', jobs: [jobNum] }));
      state.c3.session = null;
    } else {
      const { data: sessions } = await sb.from('sessions').select('*').order('created_at', { ascending: false }).limit(30);
      const matched = (sessions || []).find(s =>
        (s.jobs || []).some(j => displayJobRef(normJobRef(j)) === jobNum) ||
        (s.master_list || []).some(i => (i.jobs || []).some(j => displayJobRef(normJobRef(j)) === jobNum))
      );
      if (!matched) {
        state.c3.loading = false;
        toast('No data found for job ' + jobNum + '. Has Pick Verifier been run for this job?');
        render(); return;
      }
      state.c3.session = matched;
      /* use per-job qty when available */
      state.c3.items = (matched.master_list || [])
        .filter(i => (i.jobs || []).some(j => displayJobRef(normJobRef(j)) === jobNum))
        .map(i => ({
          ...i,
          qty: (i.jobQtys && i.jobQtys[jobNum] != null) ? i.jobQtys[jobNum]
             : (i.jobQtys && i.jobQtys['Q' + jobNum] != null) ? i.jobQtys['Q' + jobNum]
             : i.qty,
        }));
      if (!state.c3.items.length) { state.c3.loading = false; toast('No items found for job ' + jobNum); render(); return; }
    }

    state.c3.loading   = false;
    state.c3.delivered = {};
    state.view         = 'c3-check'; render();
  }

  async function submitC3Delivery() {
    const items     = state.c3.items;
    const delivered = state.c3.delivered;
    const sessionId = state.c3.session ? state.c3.session.id : null;

    const rows = items.map(item => {
      const d            = delivered[item.key] || {};
      const deliveredQty = d.status === 'delivered' ? item.qty
        : d.status === 'short' ? (d.deliveredQty !== undefined ? Number(d.deliveredQty) : 0)
        : item.qty;
      return {
        session_id:    sessionId,
        job_ref:       state.c3.jobRef,
        item_key:      item.key,
        item_name:     item.name,
        picked_qty:    item.qty,
        delivered_qty: deliveredQty,
        shortfall:     Math.max(0, item.qty - deliveredQty),
        driver_name:   state.c3.driverName || null,
        updated_at:    new Date().toISOString(),
      };
    });

    const { error } = await sb.from('deliveries').insert(rows);
    if (error) { console.error(error); toast('Could not save \u2014 check your connection'); return; }
    state.view = 'c3-done'; render();
  }

  /* ═══════════════════════════════════════════════
     M1 REPORT — copy to clipboard
  ═══════════════════════════════════════════════ */
  function copyReport() {
    const items  = state.session.masterList;
    const checks = state.checks;
    const shorts = items.filter(i => { const c = checks[i.key]; return c && (c.status === 'short' || c.status === 'part'); });
    if (!shorts.length) { toast('Nothing to order \u2014 all in stock!'); return; }
    const lines = [
      'ANNICK BATHROOMS \u2014 PURCHASING REPORT',
      `Session: ${state.session.code}`,
      `Generated: ${new Date().toLocaleString('en-GB')}`, '',
      'Item | SKU | Needed | Have | To Order | Jobs', '\u2500'.repeat(64),
      ...shorts.map(item => {
        const c = checks[item.key]; const have = c.status === 'part' ? (Number(c.haveQty) || 0) : 0;
        return `${item.name} | ${item.sku || ''} | ${item.qty} | ${have} | ${item.qty - have} | ${(item.jobs || []).join(', ')}`;
      }),
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(() => toast('Report copied to clipboard!'));
  }

  /* ═══════════════════════════════════════════════
     UTILITIES
  ═══════════════════════════════════════════════ */
  function generateCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let suffix = '';
    for (let i = 0; i < 4; i++) suffix += chars[Math.floor(Math.random() * chars.length)];
    return 'AB' + suffix;
  }

  function esc(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /* ═══════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════ */
  render();

})();
</script>
