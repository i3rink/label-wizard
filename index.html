      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      overflow-x: hidden;
      width: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .45;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 80px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .header-logo-wrap {
      flex-shrink: 0;
      width: 160px;
      height: 44px;
      display: flex;
      align-items: center;
    }
    .header-logo-svg { width: 160px; height: auto; display: block; }
    .header-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }
    .header-text span { font-size: .8rem; color: var(--muted); white-space: nowrap; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .upload-zone.drag-over { border-color: var(--teal); background: var(--teal-faint); }
    .upload-zone p { color: var(--muted); font-size: .9rem; margin-bottom: 14px; }
    .upload-zone p strong { display: block; color: var(--text); font-size: 1rem; margin-bottom: 4px; }
    #file-input { display: none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .15s, transform .1s, opacity .15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--teal-dark); }
    .btn-outline { background: transparent; color: var(--teal); border: 1.5px solid var(--teal); }
    .btn-outline:hover:not(:disabled) { background: var(--teal-faint); }
    .btn-ghost { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .btn-danger { background: var(--red); color: #fff; }

    .upload-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 4px; }

    .btn-drive { background: #fff; color: #3c4043; border: 1.5px solid #dadce0; font-weight: 600; }
    .btn-drive:hover:not(:disabled) { background: #f8f9fa; border-color: #4285f4; }
    .btn-drive svg { flex-shrink: 0; }

    .drive-status { display: flex; align-items: center; gap: 6px; font-size: .78rem; color: var(--muted); margin-top: 10px; justify-content: center; }
    .drive-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .drive-status.authed .dot { background: var(--green); }
    .drive-status.authed { color: var(--green); }

    .session-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .session-code { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--teal); letter-spacing: .08em; flex: 1; }

    /* ── Item rows ── */
    .item-list { display: flex; flex-direction: column; gap: 6px; }
    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .875rem;
    }
    .item-name { flex: 1; font-weight: 500; }
    .item-qty { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    .item-status { display: flex; gap: 6px; flex-shrink: 0; }
    .status-btn {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .status-btn.active-green { background: #d1fae5; border-color: var(--green); }
    .status-btn.active-amber { background: #fef3c7; border-color: var(--amber); }
    .status-btn.active-red   { background: #fee2e2; border-color: var(--red); }

    .item-row.status-in    { background: #f0fdf4; border-color: #bbf7d0; }
    .item-row.status-part  { background: #fffbeb; border-color: #fde68a; }
    .item-row.status-short { background: #fef2f2; border-color: #fecaca; }

    .qty-input {
      width: 64px; padding: 4px 8px;
      border: 1.5px solid var(--amber); border-radius: 6px;
      font-family: 'Hanken Grotesk', sans-serif; font-size: .85rem;
      text-align: center; outline: none;
    }
    .qty-input:focus { border-color: var(--teal); }

    .job-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .75rem; font-weight: 600; background: var(--teal-light); color: var(--teal-dark); margin-right: 4px; margin-bottom: 2px; }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 99px;
      font-size: .85rem; font-weight: 500;
      z-index: 999; transition: transform .25s ease;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .shortfall-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .shortfall-table th { text-align: left; padding: 6px 8px; color: var(--muted); font-weight: 600; font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
    .shortfall-table td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .shortfall-table tr:last-child td { border-bottom: none; }
    .need { color: var(--red); font-weight: 600; }

    .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { padding: 7px 16px; border-radius: 99px; border: 1.5px solid var(--border); background: transparent; font-family: 'Hanken Grotesk', sans-serif; font-size: .85rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }

    .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 14px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--teal); border-radius: 99px; transition: width .3s ease; }

    .text-muted { color: var(--muted); }
    .text-sm { font-size: .82rem; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }

    .empty-state { text-align: center; padding: 32px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Home launchpad ── */
    .lp-intro { margin-bottom: 20px; }
    .lp-intro h1 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }

    .lp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .lp-card {
      position: relative;
      display: flex; flex-direction: column; gap: 6px;
      padding: 20px 18px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      border-top-width: 3px;
      background: var(--surface);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform .12s, box-shadow .15s;
      font-family: 'Hanken Grotesk', sans-serif;
    }
    .lp-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .lp-card:active { transform: scale(.98); }
    .lp-card.c-blue   { border-top-color: #0075ab; }
    .lp-card.c-green  { border-top-color: #059669; }
    .lp-card.c-orange { border-top-color: #ea580c; }
    .lp-card.c-purple { border-top-color: #7c3aed; opacity: .85; }

    .lp-num { font-family: 'Bricolage Grotesque', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: .1em; }
    .lp-card.c-blue   .lp-num { color: #0075ab; }
    .lp-card.c-green  .lp-num { color: #059669; }
    .lp-card.c-orange .lp-num { color: #ea580c; }
    .lp-card.c-purple .lp-num { color: #7c3aed; }

    .lp-name { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .lp-desc { font-size: .78rem; color: var(--muted); line-height: 1.4; }
    .lp-glyph { position: absolute; top: 14px; right: 16px; opacity: .22; line-height: 1; display: block; }
    .lp-glyph svg { display: block; }

    .lp-badge { display: inline-block; font-size: .65rem; font-weight: 700; background: #ede9fe; color: #7c3aed; border-radius: 20px; padding: 2px 8px; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 2px; }

    /* ── Module 4 category grid ── */
    .c4-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
    .c4-eol-group { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    .c4-eol-group-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; background: var(--bg); user-select: none; gap: 10px; }
    .c4-eol-group-header:active { background: var(--faint); }
    .c4-eol-group-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: .85rem; color: var(--text); flex: 1; }
    .c4-eol-group-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .c4-eol-group-body { border-top: 1px solid var(--border); padding: 0 4px 4px; }
    .c4-eol-chevron { display: inline-block; }
    .c4-cat {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 10px; text-align: center;
    }
    .c4-cat-icon { font-size: 1.4rem; margin-bottom: 6px; opacity: .25; }
    .c4-cat-name { font-family: 'Bricolage Grotesque', sans-serif; font-size: .8rem; font-weight: 700; color: var(--text); }
    .c4-cat-freq { font-size: .7rem; color: var(--muted); margin-top: 2px; }
    .c4-cat-count { font-size: .7rem; color: var(--muted); margin-top: 4px; background: var(--border); border-radius: 20px; display: inline-block; padding: 1px 8px; }
    .text-input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .95rem; font-family: inherit; }
    /* ── filter bar ── */
    .c4-filter-bar { margin-bottom: 12px; }
    .c4-filter-toggle { display: flex; align-items: center; gap: 8px; background: var(--faint); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: .82rem; font-weight: 600; color: var(--text); width: 100%; text-align: left; }
    .c4-filter-toggle:active { background: var(--teal-light); }
    .c4-filter-badge { background: var(--teal); color: #fff; border-radius: 20px; font-size: .7rem; font-weight: 700; padding: 1px 7px; }
    .c4-filter-panel { background: var(--faint); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
    .c4-filter-row { display: flex; flex-direction: column; gap: 3px; }
    .c4-filter-label { font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .c4-filter-select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: .82rem; background: var(--bg); color: var(--text); }
    .c4-filter-clear { font-size: .75rem; color: var(--teal); background: none; border: none; padding: 2px 0; cursor: pointer; text-align: left; align-self: flex-start; }
    /* ── wall panels section ── */
    .c4-bay-field-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 4px; }
    .c4-bay-field-text { flex: 1; min-width: 0; }
    .c4-bay-field-text span { display: block; font-size: .72rem; color: var(--muted); }
    .c4-bay-field-text strong { display: block; font-size: .82rem; color: var(--text); word-break: break-word; }
    .c4-bay-img-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 7px; border: 1px solid var(--border); flex-shrink: 0; cursor: pointer; }
    .c4-bay-img-add { width: 56px; height: 56px; border: 2px dashed var(--border); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--muted); cursor: pointer; flex-shrink: 0; background: var(--faint); }
    .c4-bay-img-add:active { background: var(--teal-light); }
    .c4-wall-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .c4-wall-section-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: .9rem; color: var(--text); margin-bottom: 10px; }
    .c4-wall-panel-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
    .c4-wall-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg); }
    .c4-wall-panel-name { font-weight: 600; font-size: .85rem; }
    .c4-wall-panel-body { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .c4-wall-panel-img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; }
    .c4-wall-panel-img-placeholder { width: 100%; height: 80px; border: 2px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: .78rem; cursor: pointer; }
    .c4-group { margin-bottom: 18px; }
    .c4-group-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 8px; }
    .c4-item-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .c4-item-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .c4-item-name { font-size: .9rem; }
    .c4-item-row .qty-input { width: 60px; flex-shrink: 0; text-align: center; }
    .c4-stepper { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .c4-step-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 1.1rem; line-height: 1; cursor: pointer; }
    .c4-step-btn:active { background: var(--border); }
    .c4-item-row-bo { background: #fff7ed; border-radius: 8px; padding-left: 8px; }
    .c4-bo-tag { font-size: .72rem; color: #c2410c; margin-top: 3px; cursor: pointer; }
    .c4-bo-add { font-size: .72rem; color: var(--muted); background: none; border: none; padding: 0; margin-top: 3px; cursor: pointer; text-decoration: underline; }
    .c4-bo-form { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
    .c4-bo-form .text-input { padding: 6px 8px; font-size: .8rem; }
    .stock-add-form { display: flex; flex-direction: column; gap: 8px; padding: 12px; background: var(--bg); border-radius: 8px; margin-top: 4px; }
    .stock-add-form .text-input { width: 100%; }
    .c4-item-row-oos { opacity: .65; }
    .c4-loc-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; align-items: center; }
    .c4-loc-label { font-size: .7rem; color: var(--text-muted); margin-right: 2px; white-space: nowrap; }
    .c4-loc-pill { padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); font-size: .72rem; font-family: var(--font-body); cursor: pointer; color: var(--text-muted); line-height: 1.6; }
    .c4-loc-pill.active { background: #7c3aed; border-color: #7c3aed; color: #fff; font-weight: 600; }
    .c4-loc-pill:active { opacity: .75; }
    .c4-oos-tag { font-size: .72rem; color: var(--red); font-weight: 700; margin-top: 3px; display: block; }
    .stock-oos-mark-form { width: 100%; margin-top: 6px; padding: 10px; background: #fef2f2; border-radius: 8px; }
    .stock-oos-mark-form .text-input { width: 100%; padding: 6px 8px; font-size: .82rem; }

    /* ── Coming-soon banner ── */
    .cs-banner {
      background: #faf5ff; border: 1px solid #c4b5fd; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 18px;
    }
    .cs-banner-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: .9rem; color: #5b21b6; margin-bottom: 4px; }
    .cs-banner-body { font-size: .84rem; color: #6d28d9; line-height: 1.5; }

    /* ── Module nav row ── */
    .mod-back { margin-bottom: 14px; }

    /* ── Pick row indicator ── */
    .pick-indicator { font-weight: 700; font-size: 1rem; flex-shrink: 0; width: 20px; text-align: center; }

    /* ── Dashboard ── */
    .dash-wrap { margin-top: 20px; }
    .dash-heading {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .dash-heading-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    }
    .dash-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 10px; overflow: hidden;
    }
    .dash-section-head {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .dash-stripe { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }
    .dash-section-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .88rem; font-weight: 700; flex: 1; color: var(--text);
    }
    .dash-count {
      font-size: .72rem; font-weight: 700; padding: 2px 9px;
      border-radius: 20px; background: #fee2e2; color: var(--red);
    }
    .dash-count.ok { background: #d1fae5; color: var(--green); }
    .dash-section-head { cursor: pointer; user-select: none; }
    .dash-module-body { display: none; }
    .dash-module-body.open { display: block; }
    .dash-module-chevron { font-size: .75rem; color: var(--muted); transition: transform .2s; margin-left: 4px; }
    .dash-module-chevron.open { transform: rotate(90deg); }
    .c4-subcat-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 4px; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .c4-subcat-row:last-child { border-bottom: none; }
    .c4-subcat-row:active { background: var(--bg); }
    .c4-subcat-name { flex: 1; font-weight: 600; font-size: .88rem; color: var(--text); }
    .c4-subcat-meta { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Dashboard session expand ── */
    .dash-session {
      border-bottom: 1px solid var(--border);
    }
    .dash-session:last-child { border-bottom: none; }
    .dash-session-head {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px; cursor: pointer; user-select: none;
      background: var(--bg);
    }
    .dash-session-head:hover { background: var(--border); }
    .dash-session-code {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .78rem; font-weight: 700; letter-spacing: .06em;
      color: var(--muted); text-transform: uppercase; flex: 1;
    }
    .dash-session-meta { font-size: .75rem; color: var(--muted); }
    .dash-session-chevron {
      font-size: .75rem; color: var(--muted); transition: transform .15s; flex-shrink: 0;
    }
    .dash-session-chevron.open { transform: rotate(90deg); }
    .dash-session-body { display: none; }
    .dash-session-body.open { display: block; }

    .dash-job-group { border-bottom: 1px solid var(--border); }
    .dash-job-group:last-child { border-bottom: none; }
    .dash-job-label {
      padding: 7px 16px 3px; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); background: var(--bg);
    }
    .dash-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; border-top: 1px solid var(--border);
      font-size: .84rem;
    }
    .dash-item-name { flex: 1; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dash-item-short { color: var(--red); font-weight: 700; font-size: .8rem; white-space: nowrap; }
    .dash-item-detail { color: var(--muted); font-size: .78rem; white-space: nowrap; }
    .dash-more { padding: 6px 16px; font-size: .78rem; color: var(--muted); border-top: 1px solid var(--border); }
    .dash-footer {
      padding: 10px 16px; display: flex; justify-content: flex-end;
      border-top: 1px solid var(--border); background: var(--bg);
    }
    .dash-clear {
      text-align: center; padding: 28px 16px; color: var(--muted);
    }
    .dash-clear-icon { font-size: 2rem; margin-bottom: 6px; }
    .dash-loading { padding: 20px 16px; text-align: center; color: var(--muted); font-size: .84rem; }
    .dash-archive-btn {
      font-size: .72rem; padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); cursor: pointer; flex-shrink: 0;
      font-family: inherit; line-height: 1.4;
    }
    .dash-archive-btn:hover { background: #fee2e2; color: var(--red); border-color: #fca5a5; }

    @media (max-width: 520px) {
      .item-row { flex-wrap: wrap; }
      .session-code { font-size: 1.3rem; }
      .header-logo-wrap { width: 120px; }
      .header-logo-svg { width: 120px; }
      .lp-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .lp-name { font-size: .9rem; }
      .lp-desc { display: none; }
      .c4-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>

  let toastTimer;
  function toast(msg, dur = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), dur);
  }

  /* ═══════════════════════════════════════════════
     RENDER DISPATCH
  ═══════════════════════════════════════════════ */
  function render() {
    applyTheme(state.module);
    const root = document.getElementById('root');
    const v = state.view;
    if (v === 'home')          root.innerHTML = renderHome();
    else if (v === 'upload')   root.innerHTML = renderUpload();
    else if (v === 'session')  root.innerHTML = renderSession();
    else if (v === 'check')    root.innerHTML = renderCheck();
    else if (v === 'report')   root.innerHTML = renderReport();
    else if (v === 'c2-home')  root.innerHTML = renderC2Home();
    else if (v === 'c2-jobs')  root.innerHTML = renderC2Jobs();
    else if (v === 'c2-pick')  root.innerHTML = renderC2Pick();
    else if (v === 'c2-done')  root.innerHTML = renderC2Done();
    else if (v === 'c3-home')  root.innerHTML = renderC3Home();
    else if (v === 'c3-check') root.innerHTML = renderC3Check();
    else if (v === 'c3-done')  root.innerHTML = renderC3Done();
    else if (v === 'c4-overview') root.innerHTML = renderC4Overview();
    else if (v === 'c4-misc')     root.innerHTML = renderC4Misc();
    else if (v === 'c4-eol')       root.innerHTML = renderC4EOL();
    else if (v === 'c4-showroom')  root.innerHTML = renderC4Showroom();
    else if (v === 'c4-subcats') root.innerHTML = renderC4SubCats();
    else if (v === 'c4-category') {
      root.innerHTML = renderC4Category();
      const s = document.querySelector('[data-action="c4-search"]');
      if (s && state.c4.searchFocused) {
        s.focus();
        s.setSelectionRange(s.value.length, s.value.length);
      }
    }
    bindEvents();
  }

  function categoriseItem(sku, name) {
    for (const [cat, rules] of CAT_RULES) {
      for (const [re, field] of rules) {
        if ((field === 's' || field === 'b') && re.test(sku)) return cat;
        if ((field === 'n' || field === 'b') && re.test(name)) return cat;
      }
    }
    return 'Sundries';
  }

  function renderItemRow(item, checks) {

        <div class="item-name">${esc(item.name)}${skuHtml}${altBadge}</div>
        <div class="item-qty">Qty: ${item.qty}${unitHtml}</div>
        ${st === 'part' ? `<input class="qty-input" type="number" min="0" max="${item.qty}" placeholder="Have?" value="${c.haveQty || ''}" data-action="qty-input" data-key="${esc(item.key)}" />` : ''}
        <div class="item-status">
          <button class="status-btn ${st === 'in'    ? 'active-green' : ''}" data-action="set-status" data-key="${esc(item.key)}" data-status="in"    title="In stock">&#10003;</button>
          <button class="status-btn ${st === 'part'  ? 'active-amber' : ''}" data-action="set-status" data-key="${esc(item.key)}" data-status="part"  title="Partial">~</button>
          <button class="status-btn ${st === 'short' ? 'active-red'   : ''}" data-action="set-status" data-key="${esc(item.key)}" data-status="short" title="Short">&#10007;</button>
          <button class="status-btn ${alt ? 'active-amber' : ''}" data-action="open-alt" data-key="${esc(item.key)}" data-name="${esc(item.name)}" data-qty="${item.qty}" title="Propose alternative" style="font-size:.7rem;font-weight:700;color:${alt ? '#7c3aed' : 'var(--muted)'};border-color:${alt ? '#c4b5fd' : 'var(--border)'};">Alt</button>
        </div>
      </div>`;
  }

  function renderCheck() {
    const items  = state.session.masterList;
    const checks = state.checks;
    const total  = items.length;
    const done   = Object.values(checks).filter(c => c.status).length;
    const pct    = total ? Math.round((done / total) * 100) : 0;

    /* flat filtered views for Short and In Stock tabs */
    if (state.tab === 'short' || state.tab === 'in') {
      const filtered = items.filter(i =>
        state.tab === 'short'
          ? (checks[i.key]?.status === 'short' || checks[i.key]?.status === 'part')
          : checks[i.key]?.status === 'in'
      );
      const rows = filtered.map(i => renderItemRow(i, checks)).join('');
      return renderCheckShell(total, done, pct, checks,
        rows || `<div class="empty-state"><div class="icon">&#10003;</div><p>Nothing here</p></div>`);
    }

    /* All and Remaining — grouped by category */
    const showItems = state.tab === 'remaining'
      ? items.filter(i => !checks[i.key]?.status)
      : items;

    /* build per-category buckets */
    const buckets = {};
    CAT_ORDER.forEach(c => buckets[c] = []);
    showItems.forEach(i => buckets[categoriseItem(i.sku || '', i.name)].push(i));

    const catColours = {
      'Wet Areas':  '#0075ab', 'Glassware':  '#0891b2',
      'Furniture':  '#059669', 'Brassware':  '#d97706',
      'Panels':     '#7c3aed', 'Flooring':   '#b45309',
      'Sundries':   '#64748b',
    };

    const sections = CAT_ORDER.map(cat => {
      const catItems = buckets[cat];
      if (!catItems.length) return '';
      const catDone = catItems.filter(i => checks[i.key]?.status).length;
      const isOpen     = state.catExpanded?.[cat] === true; /* collapsed by default */
      const isSubmitted = !!(state.catSubmitted?.[cat]);
      const colour      = catColours[cat];
      const rows        = catItems.map(i => renderItemRow(i, checks)).join('');
      const catBg       = isSubmitted ? '#f0fdf4' : 'var(--bg)';
      const catBorder   = isSubmitted ? '#bbf7d0' : 'var(--border)';
      return `
        <div class="cat-section" style="margin-bottom:8px;border:1px solid ${catBorder};border-radius:10px;overflow:hidden;">
          <div style="display:flex;align-items:center;background:${catBg};">
            <button class="cat-head" data-action="toggle-cat" data-cat="${esc(cat)}"
              style="flex:1;display:flex;align-items:center;gap:10px;padding:10px 14px;background:transparent;border:none;cursor:pointer;text-align:left;font-family:inherit;">
              <div style="width:4px;height:18px;border-radius:2px;background:${colour};flex-shrink:0;"></div>
              <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.85rem;flex:1;color:var(--text);">${esc(cat)}</div>
              <div style="font-size:.75rem;color:var(--muted);">${catDone}/${catItems.length}</div>
              <div style="font-size:.7rem;color:var(--muted);transition:transform .15s;${isOpen ? '' : 'transform:rotate(-90deg);'}">&#9660;</div>
            </button>
            <button data-action="submit-cat" data-cat="${esc(cat)}"
              style="flex-shrink:0;margin-right:10px;padding:4px 10px;border-radius:20px;border:1.5px solid ${isSubmitted ? 'var(--green)' : 'var(--border)'};background:${isSubmitted ? '#d1fae5' : 'transparent'};color:${isSubmitted ? 'var(--green)' : 'var(--muted)'};font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;"
              title="${isSubmitted ? 'Mark as not done' : 'Mark category as done'}">
              ${isSubmitted ? '&#10003; Done' : 'Mark done'}
            </button>
          </div>
          <div class="cat-body item-list" style="padding:6px 8px 8px;${isOpen ? '' : 'display:none;'}">${rows}</div>
        </div>`;
    }).join('');

    return renderCheckShell(total, done, pct, checks,
      sections || `<div class="empty-state"><div class="icon">&#10003;</div><p>Nothing here</p></div>`);
  }

  function renderAltModal() {
    const m = state.altModal;
    if (!m) return '';
    const existing = state.alternatives?.[m.key] || {};
    return `
      <div id="alt-modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;">
        <div style="background:var(--surface);border-radius:var(--radius);padding:22px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);">
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1rem;margin-bottom:4px;">Propose alternative</div>
          <div style="font-size:.83rem;color:var(--muted);margin-bottom:16px;">${esc(m.name)} &middot; Qty ${m.qty}</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div>
              <label style="font-size:.78rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Alternative item name</label>
              <input id="alt-name-input" type="text" placeholder="e.g. Brushed Nickel Basin Mixer" value="${esc(existing.altName || '')}"
                style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.9rem;outline:none;" />
            </div>
            <div>
              <label style="font-size:.78rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Alternative SKU</label>
              <input id="alt-sku-input" type="text" placeholder="e.g. BR-NICKEL241" value="${esc(existing.altSku || '')}"
                style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.9rem;outline:none;" />
            </div>
            <div style="font-size:.75rem;color:var(--muted);">At least one field required.</div>
            <div id="alt-error" style="color:var(--red);font-size:.8rem;min-height:18px;"></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
            <button class="btn btn-primary" data-action="alt-save" style="background:#7c3aed;border-color:#7c3aed;">Save alternative</button>
            ${existing.altName || existing.altSku ? `<button class="btn btn-ghost" data-action="alt-clear" style="color:var(--red);">Remove</button>` : ''}
            <button class="btn btn-ghost" data-action="alt-close">Cancel</button>
          </div>
        </div>
      </div>`;
  }

  function renderCheckShell(total, done, pct, checks, inner) {
    const shortCount = Object.values(checks).filter(c => c.status === 'short' || c.status === 'part').length;
    const inCount    = Object.values(checks).filter(c => c.status === 'in').length;
    return `${renderAltModal()}
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:10px;">
          <div>
            <span class="card-title" style="margin-bottom:0;">Stock Check</span>
            <div class="text-muted text-sm">${state.session.code} &middot; ${done}/${total} checked</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
            <button class="btn btn-ghost" data-action="go-home">&#8592; Home</button>
            <button class="btn btn-outline" data-action="submit-all" id="submit-all-btn">&#10003; Submit</button>
            <button class="btn btn-primary" data-action="go-report">Report &#8594;</button>
          </div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="tabs">
          <button class="tab-btn ${state.tab === 'all'       ? 'active' : ''}" data-action="tab" data-tab="all">All (${total})</button>
          <button class="tab-btn ${state.tab === 'remaining' ? 'active' : ''}" data-action="tab" data-tab="remaining">Remaining (${total - done})</button>
          <button class="tab-btn ${state.tab === 'short'     ? 'active' : ''}" data-action="tab" data-tab="short">Short (${shortCount})</button>
          <button class="tab-btn ${state.tab === 'in'        ? 'active' : ''}" data-action="tab" data-tab="in">In Stock (${inCount})</button>
        </div>
        ${inner}
      </div>`;
  }

  function renderReport() {
    const items  = state.session.masterList;
    const checks = state.checks;
    const shorts = items.filter(i => { const c = checks[i.key]; return c && (c.status === 'short' || c.status === 'part'); });
    const rows = shorts.map(item => {
      const c    = checks[item.key];
      const have = c.status === 'part' ? (Number(c.haveQty) || 0) : 0;
      const need = item.qty - have;
      return `<tr><td>${esc(item.name)}</td><td class="report-sku">${item.sku ? esc(item.sku) : '&mdash;'}</td><td>${item.qty}</td><td>${have}</td><td class="need">${need}</td><td>${item.jobs ? esc(item.jobs.join(', ')) : ''}</td></tr>`;
    }).join('');
    return `
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:16px;">
          <div class="card-title" style="margin-bottom:0;">Purchasing Report</div>
          <button class="btn btn-ghost" data-action="go-check">&#8592; Back</button>
        </div>
        ${shorts.length === 0
          ? `<div class="empty-state"><div class="icon">&#127881;</div><p>All items in stock &mdash; nothing to order!</p></div>`
          : `<table class="shortfall-table"><thead><tr><th>Item</th><th>SKU</th><th>Needed</th><th>Have</th><th>To Order</th><th>Job(s)</th></tr></thead><tbody>${rows}</tbody></table>`}
        <div class="flex gap-2 flex-wrap mt-4">
          <button class="btn btn-primary" data-action="copy-report">&#128203; Copy Report</button>
          <button class="btn btn-ghost"   data-action="new-session">New Session</button>
          <button class="btn btn-ghost"   data-action="go-home">&#8592; Home</button>
        </div>
      </div>`;
  }

  /* ═══════════════════════════════════════════════
     MODULE 2 — PICK COMPLETION
  ═══════════════════════════════════════════════ */
  function renderC2Home() {
    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="go-home">&#8592; Home</button></div>
      <div class="card">
        <div class="card-title">Pick Completion</div>
        <p class="text-muted text-sm" style="margin-bottom:14px;">Enter the session code from Pick Verifier to load this week&#8217;s jobs.</p>
        <div class="flex gap-2 flex-wrap items-center">
          <input id="c2-code" type="text" placeholder="e.g. AB3K7P" autocapitalize="characters"
            style="flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;" />
          <button class="btn btn-primary" data-action="c2-load">Load Session &#8594;</button>
        </div>
        ${state.c2.loading ? `<p class="text-muted text-sm mt-2">Loading&#8230;</p>` : ''}
      </div>`;
  }

  function renderC2Jobs() {
    const s    = state.c2.session;
    const jobs = s.jobs || [];
    const jobRows = jobs.map(jobRef => {
      /* Count items that appear on this specific job's packing slip */
      const items = s.masterList.filter(i => i.jobs && i.jobs.includes(jobRef));
      const picks = state.c2.picks[jobRef] || {};
      const entered = Object.values(picks).filter(p => p.qty !== null && p.qty !== undefined).length;
      return `
        <div class="item-row" style="cursor:pointer;" data-action="c2-select-job" data-job="${esc(jobRef)}">
          <div class="item-name">${esc(displayJobRef(jobRef))}</div>
          <div class="item-qty">${items.length} item${items.length !== 1 ? 's' : ''}</div>
          ${entered > 0 ? `<span class="job-tag">${entered} entered</span>` : ''}
          <div style="color:var(--muted);font-size:1.2rem;flex-shrink:0;">&#8250;</div>
        </div>`;
    }).join('');
    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="go-home">&#8592; Home</button></div>
      <div class="card">
        <div class="card-title">Jobs &mdash; ${esc(s.code)}</div>
        <p class="text-muted text-sm" style="margin-bottom:14px;">${jobs.length} job${jobs.length !== 1 ? 's' : ''} on this session. Select one to start picking.</p>
        <div class="item-list">${jobRows}</div>
      </div>`;
  }

  function renderC2Pick() {
    const s      = state.c2.session;
    const jobRef = state.c2.selectedJob;
    const items  = s.masterList.filter(i => i.jobs && i.jobs.includes(jobRef));
    const picks  = state.c2.picks[jobRef] || {};
    const total  = items.length;
    const entered = Object.values(picks).filter(p => p.qty !== null && p.qty !== undefined).length;
    const pct    = total ? Math.round(entered / total * 100) : 0;

    const rows = items.map(item => {
      const p = picks[item.key];
      const val = (p && p.qty !== undefined && p.qty !== null) ? p.qty : '';
      /* ── FIX: use per-job qty from packing slip, not consolidated total ── */
      const needed = (item.jobQtys && item.jobQtys[jobRef] != null)
        ? item.jobQtys[jobRef]
        : item.qty;
      let rowClass = '', indColor = '', indChar = '';
      if (val !== '') {
        const n = Number(val);
        if (n >= needed)    { rowClass = 'status-in';    indColor = 'var(--green)'; indChar = '&#10003;'; }
        else if (n > 0)     { rowClass = 'status-part';  indColor = 'var(--amber)'; indChar = '~'; }
        else                { rowClass = 'status-short'; indColor = 'var(--red)';   indChar = '&#10007;'; }
      }
      return `
        <div class="item-row ${rowClass}">
          <div class="item-name">${esc(item.name)}${item.sku ? `<span class="item-sku">${esc(item.sku)}</span>` : ''}</div>
          <div class="item-qty">Need: ${needed}${item.unit ? ' ' + esc(item.unit) : ''}</div>
          <input class="qty-input" type="number" min="0" style="width:72px;"
            placeholder="${needed}" value="${val}"
            data-action="c2-qty" data-key="${esc(item.key)}" data-needed="${needed}" />
          ${indChar ? `<div class="pick-indicator" style="color:${indColor};">${indChar}</div>` : '<div class="pick-indicator"></div>'}
        </div>`;
    }).join('');

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c2-back-jobs">&#8592; Jobs</button></div>
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:10px;">
          <div>
            <span class="card-title" style="margin-bottom:0;">Picking &mdash; ${esc(displayJobRef(jobRef))}</span>
            <div class="text-muted text-sm">${entered}/${total} entered &middot; blank = fully picked</div>
          </div>
          <button class="btn btn-primary" data-action="c2-submit">Submit &#8594;</button>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="item-list">${rows}</div>
      </div>
      <p class="text-muted text-sm" style="padding:0 4px;">Leave blank to record as fully picked. Only change the number if you picked less than needed.</p>`;
  }

  function renderC2Done() {
    const s      = state.c2.session;
    const jobRef = state.c2.selectedJob;
    const picks  = state.c2.picks[jobRef] || {};
    const items  = s.masterList.filter(i => i.jobs && i.jobs.includes(jobRef));
    const shorts = items.filter(i => {
      const p = picks[i.key];
      if (!p || p.qty === null || p.qty === undefined) return false;
      const needed = (i.jobQtys && i.jobQtys[jobRef] != null) ? i.jobQtys[jobRef] : i.qty;
      return Number(p.qty) < needed;
    });

    const shortRows = shorts.map(item => {
      const p    = picks[item.key];
      const pQty = Number(p.qty);
      const needed = (item.jobQtys && item.jobQtys[jobRef] != null) ? item.jobQtys[jobRef] : item.qty;
      return `<tr><td>${esc(item.name)}</td><td class="report-sku">${item.sku ? esc(item.sku) : '&mdash;'}</td><td>${needed}</td><td>${pQty}</td><td class="need">${needed - pQty}</td></tr>`;
    }).join('');

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c2-back-jobs">&#8592; Jobs</button></div>
      <div class="card">
        <div class="card-title">Pick submitted &mdash; ${esc(displayJobRef(jobRef))}</div>
        ${shorts.length === 0
          ? `<div class="empty-state"><div class="icon">&#127881;</div><p>Fully picked &mdash; nothing short.</p></div>`
          : `<p class="text-muted text-sm" style="margin-bottom:12px;">${shorts.length} item${shorts.length !== 1 ? 's' : ''} short:</p>
             <table class="shortfall-table"><thead><tr><th>Item</th><th>SKU</th><th>Needed</th><th>Picked</th><th>Short</th></tr></thead><tbody>${shortRows}</tbody></table>`}
        <div class="flex gap-2 flex-wrap mt-4">
          ${shorts.length > 0 ? `<button class="btn btn-primary" data-action="c2-copy-short">&#128203; Copy to Purchasing</button>` : ''}
          <button class="btn btn-ghost" data-action="c2-back-jobs">Back to Jobs</button>
          <button class="btn btn-ghost" data-action="go-home">&#8592; Home</button>
        </div>
      </div>`;
  }

  /* ═══════════════════════════════════════════════
     MODULE 3 — DRIVER DELIVERY
  ═══════════════════════════════════════════════ */
  function renderC3Home() {
    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="go-home">&#8592; Home</button></div>
      <div class="card">
        <div class="card-title">Driver Delivery</div>
        <p class="text-muted text-sm" style="margin-bottom:16px;">Enter your job number to see what to deliver on site.</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input id="c3-job" type="text" placeholder="Job number e.g. 1659" autocapitalize="off"
            style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;" />
          <input id="c3-driver" type="text" placeholder="Your name (optional)"
            style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;" value="${esc(state.c3.driverName)}" />
          <button class="btn btn-primary" data-action="c3-load" style="width:100%;">Find Job &#8594;</button>
        </div>
        ${state.c3.loading ? `<p class="text-muted text-sm mt-2">Looking up job&#8230;</p>` : ''}
      </div>`;
  }

  function renderC3Check() {
    const items     = state.c3.items;
    const delivered = state.c3.delivered;
    const total     = items.length;
    const done      = Object.values(delivered).filter(d => d.status).length;
    const pct       = total ? Math.round(done / total * 100) : 0;

    const rows = items.map(item => {
      const d  = delivered[item.key] || {};
      const st = d.status || '';
      const rowClass = st === 'delivered' ? 'status-in' : st === 'short' ? 'status-short' : '';
      return `
        <div class="item-row ${rowClass}">
          <div class="item-name">${esc(item.name)}${item.sku ? `<span class="item-sku">${esc(item.sku)}</span>` : ''}</div>
          <div class="item-qty">Qty: ${item.qty}${item.unit ? ' ' + esc(item.unit) : ''}</div>
          ${st === 'short' ? `<input class="qty-input" type="number" min="0" max="${item.qty}"
            placeholder="Qty?" value="${d.deliveredQty !== undefined ? d.deliveredQty : ''}"
            data-action="c3-qty" data-key="${esc(item.key)}" />` : ''}
          <div class="item-status">
            <button class="status-btn ${st === 'delivered' ? 'active-green' : ''}"
              data-action="c3-status" data-key="${esc(item.key)}" data-status="delivered" title="Delivered in full">&#10003;</button>
            <button class="status-btn ${st === 'short' ? 'active-red' : ''}"
              data-action="c3-status" data-key="${esc(item.key)}" data-status="short" title="Short / partial">&#10007;</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c3-back">&#8592; Back</button></div>
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:10px;">
          <div>
            <span class="card-title" style="margin-bottom:0;">Delivering &mdash; ${esc(displayJobRef(state.c3.jobRef))}</span>
            <div class="text-muted text-sm">${done}/${total} confirmed &middot; tick each item as it lands</div>
          </div>
          <button class="btn btn-primary" data-action="c3-submit" ${done < 1 ? 'disabled' : ''}>Submit &#8594;</button>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="item-list">${rows || '<div class="empty-state"><p>No items loaded.</p></div>'}</div>
      </div>`;
  }

  function renderC3Done() {
    const items     = state.c3.items;
    const delivered = state.c3.delivered;
    const shorts    = items.filter(i => { const d = delivered[i.key]; return d && d.status === 'short'; });

    const shortRows = shorts.map(item => {
      const d      = delivered[item.key];
      const delQty = d.deliveredQty !== undefined ? Number(d.deliveredQty) : 0;
      return `<tr><td>${esc(item.name)}</td><td>${item.qty}</td><td>${delQty}</td><td class="need">${item.qty - delQty}</td></tr>`;
    }).join('');

    return `
      <div class="card">
        <div class="card-title">Delivery submitted &mdash; ${esc(displayJobRef(state.c3.jobRef))}</div>
        ${shorts.length === 0
          ? `<div class="empty-state"><div class="icon">&#127881;</div><p>Full delivery &mdash; all items confirmed on site.</p></div>`
          : `<p class="text-muted text-sm" style="margin-bottom:12px;">${shorts.length} item${shorts.length !== 1 ? 's' : ''} not fully delivered:</p>
             <table class="shortfall-table"><thead><tr><th>Item</th><th>Expected</th><th>Delivered</th><th>Short</th></tr></thead><tbody>${shortRows}</tbody></table>`}
        <div class="flex gap-2 flex-wrap mt-4">
          <button class="btn btn-ghost" data-action="c3-another">Another Job</button>
          <button class="btn btn-ghost" data-action="go-home">&#8592; Home</button>
        </div>
      </div>`;
  }

     MODULE 4 — STOCK CHECKER (scaffold)
  ═══════════════════════════════════════════════ */

    { key: 'wet_areas',   name: 'Wet Areas',     icon: '&#9711;' },
    { key: 'glassware',   name: 'Glassware',     icon: '&#9671;' },
    { key: 'brassware',   name: 'Brassware',     icon: '&#9672;' },
    { key: 'furniture',   name: 'Furniture & Ceramics', icon: '&#9636;' },
    { key: 'heating',       name: 'Heating',              icon: '&#9651;' },
    { key: 'mirrors_cabinets', name: 'Mirrors & Cabinets',  icon: '&#9645;' },
    { key: 'sundries',    name: 'Sundries',      icon: '&#9637;' },
    { key: 'eol',         name: 'End of Line',   icon: '&#9735;', special: 'eol' },

  async function loadC4Counts() {
    if (state.c4.counts) return;
    state.c4.counts = {};
    const { data, error } = await sb.from('stock_items').select('category');
    if (error) { toast('Could not load stock categories'); return; }
    (data || []).forEach(row => {
      state.c4.counts[row.category] = (state.c4.counts[row.category] || 0) + 1;
    });
  }

  function renderC4Overview() {
    const counts = state.c4.counts || {};
    const catCards = C4_CATS.map(c => {
      if (c.special === 'eol') {
        const n = (state.c4.eolItems || []).length;
        return `
      <div class="c4-cat" data-action="c4-open-eol" style="cursor:pointer;background:linear-gradient(180deg,#f97316 0%,#ffffff 100%);">
        <div class="c4-cat-icon" style="opacity:1;color:#fff;">${c.icon}</div>
        <div class="c4-cat-name" style="color:#7c2d00;">${esc(c.name)}</div>
        <div class="c4-cat-count" style="background:rgba(249,115,22,.15);color:#7c2d00;">${n} item${n === 1 ? '' : 's'}</div>
      </div>`;
      }
      if (c.special === 'misc') {
        const n = state.c4.miscCount || 0;
        return `
      <div class="c4-cat" data-action="c4-open-misc" style="cursor:pointer;background:linear-gradient(180deg,#5b7b8a 0%,#ffffff 100%);">
        <div class="c4-cat-icon" style="opacity:1;color:#fff;">${c.icon}</div>
        <div class="c4-cat-name" style="color:#1e3a42;">${esc(c.name)}</div>
        <div class="c4-cat-count" style="background:rgba(91,123,138,.15);color:#1e3a42;">${n} logged</div>
      </div>`;
      }
      if (c.special === 'showroom') {
        const n = state.c4.showroomCount || 0;
        return `
      <div class="c4-cat" data-action="c4-open-showroom" style="cursor:pointer;background:linear-gradient(180deg,#4a9fa5 0%,#ffffff 100%);">
        <div class="c4-cat-icon" style="opacity:1;color:#fff;">${c.icon}</div>
        <div class="c4-cat-name" style="color:#164044;">${esc(c.name)}</div>
        <div class="c4-cat-count" style="background:rgba(74,159,165,.15);color:#164044;">${n} bay${n === 1 ? '' : 's'} recorded</div>
      </div>`;
      }
      if (c.special === 'goods_in') {
        return `
      <div class="c4-cat" style="cursor:default;opacity:.75;position:relative;background:linear-gradient(180deg,#2a9d8f 0%,#ffffff 100%);">
        <div class="c4-cat-icon" style="opacity:1;color:#fff;">${c.icon}</div>
        <div class="c4-cat-name" style="color:#0d3d38;">${esc(c.name)}</div>
        <div class="c4-cat-count" style="background:rgba(42,157,143,.15);color:#0d3d38;">Coming soon</div>
      </div>`;
      }
      const n = counts[c.key] || 0;
      const tileTop = c.key === 'sundries' ? '#4f6d7a' : '#0075ab';
      const tileDark = c.key === 'sundries' ? '#1a2d35' : '#003d5c';
      const tileAlpha = c.key === 'sundries' ? 'rgba(79,109,122,.15)' : 'rgba(0,117,171,.12)';
      return `
