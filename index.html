  /* ── EOL — load all items where sku starts with EOL ── */
  async function loadC4EOLItems() {
    const { data, error } = await sb.from('stock_items')
      .select('*')
      .ilike('sku', 'EOL%')
      .order('install_category')
      .order('name');
    if (error) { toast('Could not load EOL items'); state.c4.eolItems = []; return; }
    state.c4.eolItems = data || [];
  }

  function renderC4EOL() {
    const items = state.c4.eolItems;
    if (!items) {
      return `<div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
        <div class="card"><p class="text-muted">Loading&hellip;</p></div>`;
    }
    if (items.length === 0) {
      return `
        <div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
        <div class="card">
          <div class="card-title">End of Line</div>
          <div class="empty-state"><div class="icon">&#9989;</div><p>No EOL items found.</p></div>
        </div>`;
    }

    /* group by install_category */
    const groups = {};
    items.forEach(i => {
      const g = i.install_category || 'Uncategorised';
      (groups[g] = groups[g] || []).push(i);
    });
    const groupKeys = Object.keys(groups).sort();

    const sections = groupKeys.map(g => {
      const grpItems = groups[g];
      const isOpen = !!(state.c4.eolExpanded || {})[g];
      const counted = grpItems.filter(i => i.current_qty !== null && i.current_qty !== undefined).length;
      const rows = grpItems.map(i => {
        const isBackordered = !!i.backorder_until;
        const boTag = isBackordered
          ? `<div class="c4-bo-tag" data-action="c4-bo-open" data-id="${esc(i.id)}">Back order &mdash; due ${esc(formatDateUK(i.backorder_until))}${i.backorder_note ? ': ' + esc(i.backorder_note) : ''}</div>`
          : `<button class="c4-bo-add" data-action="c4-bo-open" data-id="${esc(i.id)}">+ Back order</button>`;
        const boForm = state.c4.boOpenId === i.id ? `
          <div class="c4-bo-form">
            <input class="text-input" type="date" data-action="c4-bo-date" data-id="${esc(i.id)}" value="${i.backorder_until || ''}" />
            <input class="text-input" type="text" placeholder="Note (optional)" data-action="c4-bo-note" data-id="${esc(i.id)}" value="${esc(i.backorder_note || '')}" style="flex:1;" />
            <button class="btn btn-ghost" data-action="c4-bo-save" data-id="${esc(i.id)}">Save</button>
            ${isBackordered ? `<button class="btn btn-ghost" data-action="c4-bo-clear" data-id="${esc(i.id)}">Clear</button>` : ''}
          </div>` : '';
        return `
        <div class="c4-item-row${isBackordered ? ' c4-item-row-bo' : ''}${i.out_of_stock ? ' c4-item-row-oos' : ''}">
          <div class="c4-item-info">
            <div class="c4-item-name">${esc(i.name)}</div>
            ${(i.sku || i.vendor_sku) ? `<span class="item-sku">${esc(i.sku || i.vendor_sku)}</span>` : ''}
            ${i.out_of_stock ? `<span class="c4-oos-tag">Out of stock${i.oos_expected_label ? ' &mdash; ' + esc(i.oos_expected_label) : ''}</span>` : ''}
            <div class="c4-loc-pills">
              <span class="c4-loc-label">Location</span>
              ${['7','9','11','SHO','19'].map(loc => `<button class="c4-loc-pill${(i.warehouse||'') === loc ? ' active' : ''}" data-action="c4-loc" data-id="${esc(i.id)}" data-loc="${loc}">${loc}</button>`).join('')}
            </div>
            ${boTag}
            ${boForm}
          </div>
          <div class="c4-stepper">
            <button class="c4-step-btn" data-action="c4-step" data-id="${esc(i.id)}" data-dir="-1">&minus;</button>
            <input class="qty-input" type="tel" inputmode="numeric" placeholder="Qty"
              value="${i.current_qty ?? ''}"
              data-action="c4-qty-input" data-id="${esc(i.id)}" />
            <button class="c4-step-btn" data-action="c4-step" data-id="${esc(i.id)}" data-dir="1">&plus;</button>
          </div>
        </div>`;
      }).join('');

      return `
        <div class="c4-eol-group">
          <div class="c4-eol-group-header" data-action="c4-eol-toggle" data-group="${esc(g)}">
            <div class="c4-eol-group-title">${esc(g)}</div>
            <div class="c4-eol-group-meta">
              <span class="c4-cat-count">${grpItems.length} item${grpItems.length !== 1 ? 's' : ''}</span>
              ${counted > 0 ? `<span class="c4-cat-count" style="background:#d1fae5;color:#059669;">${counted} counted</span>` : ''}
              <span class="c4-eol-chevron" style="color:var(--muted);font-size:.85rem;transition:transform .2s;${isOpen ? 'transform:rotate(90deg);' : ''}">&rsaquo;</span>
            </div>
          </div>
          ${isOpen ? `<div class="c4-eol-group-body">${rows}</div>` : ''}
        </div>`;
    }).join('');

    const totalCounted = items.filter(i => i.current_qty !== null && i.current_qty !== undefined).length;

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
      <div class="card">
        <div class="card-title">End of Line</div>
        <p class="text-muted text-sm" style="margin-bottom:12px;">${totalCounted} of ${items.length} counted &mdash; tap a category to expand</p>
        ${sections}
      </div>`;
  }

  /* ── category item list — count entry screen ── */
  async function loadC4Items(cat) {
    state.c4.loading = true;
    render();
    /* furniture tile also covers ceramics */
    const multiCats = cat === 'furniture' ? ['furniture', 'ceramics'] : null;
    const query = sb.from('stock_items').select('*').order('sub_category').order('name');
    const { data, error } = multiCats
      ? await query.in('category', multiCats)
      : await query.eq('category', cat);
    state.c4.loading = false;
    if (error) { toast('Could not load items'); state.c4.items = []; return; }
    state.c4.items = data || [];
  }

  /* ── misc stock ── */
  async function loadMiscItems() {
    const { data, error } = await sb.from('misc_stock').select('*').order('created_at', { ascending: false });
    if (error) { toast('Could not load misc items'); return; }
    state.c4.miscItems = data || [];
    state.c4.miscCount = (data || []).length;
  }

  function renderC4Misc() {
    const items = state.c4.miscItems || [];
    const rows = items.map(i => `
      <div class="c4-item-row">
        <div class="c4-item-info" style="flex:1;">
          <div class="c4-item-name">${esc(i.description)}</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
            <span class="item-sku">Qty: ${i.qty ?? '—'}</span>
            ${i.warehouse ? `<span class="item-sku" style="background:#ede9fe;color:#7c3aed;">${esc(i.warehouse)}</span>` : ''}
          </div>
        </div>
        <button class="btn btn-ghost" data-action="c4-misc-delete" data-id="${esc(i.id)}" style="font-size:.75rem;padding:4px 8px;flex-shrink:0;">Remove</button>
      </div>`).join('');

    const locs = ['7','9','11','SHO','19'];
    const form = `
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="card-title" style="font-size:.9rem;margin-bottom:10px;">Log an item</div>
        <textarea class="text-input" id="misc-desc" placeholder="Describe the item&hellip;" rows="2" style="width:100%;margin-bottom:8px;resize:none;"></textarea>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
          <label style="font-size:.78rem;color:var(--text-muted);white-space:nowrap;">Qty</label>
          <input class="text-input" id="misc-qty" type="tel" inputmode="numeric" placeholder="0" style="width:70px;" />
        </div>
        <div class="c4-loc-pills" style="margin-bottom:12px;">
          <span class="c4-loc-label">Location</span>
          ${locs.map(l => `<button class="c4-loc-pill" data-action="c4-misc-loc" data-loc="${l}">${l}</button>`).join('')}
        </div>
        <button class="btn btn-primary" data-action="c4-misc-save" style="width:100%;">Log item</button>
      </div>`;

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
      <div class="card">
        <div class="card-title">Miscellaneous Stock</div>
        <p class="text-muted text-sm" style="margin-bottom:12px;">Log any items that aren't in the main stock lists. Admin will review and add them properly.</p>
        ${items.length ? rows : '<p class="text-muted text-sm">Nothing logged yet.</p>'}
        ${form}
      </div>`;
  }

  async function saveMiscItem() {
    const desc = (document.getElementById('misc-desc') || {}).value || '';
    const qty  = (document.getElementById('misc-qty')  || {}).value || '';
    const loc  = state.c4.miscLoc || null;
    if (!desc.trim()) { toast('Please add a description'); return; }
    const row = {
      description:  desc.trim(),
      qty:          qty === '' ? null : Number(qty),
      warehouse:    loc,
      submitted_by: state.role || 'warehouse',
      reviewed:     false,
    };
    const { error } = await sb.from('misc_stock').insert(row);
    if (error) { toast('Save failed — check connection'); return; }
    state.c4.miscLoc = null;
    await loadMiscItems();
    render();
    toast('Item logged');
  }

  async function deleteMiscItem(id) {
    if (!confirm('Remove this item?')) return;
    const { error } = await sb.from('misc_stock').delete().eq('id', id);
    if (error) { toast('Delete failed'); return; }
    await loadMiscItems();
    render();
  }

  /* ── showroom bays ── */
  const SHOWROOM_FIELDS = ['Bath or Shower', 'Screen', 'WC', 'Basin', 'Furniture', 'Brassware', 'Wall Panels', 'Flooring'];

  async function loadShowroomBays() {
    const { data, error } = await sb.from('showroom_bays').select('*').order('bay_number', { ascending: true });
    if (error) { toast('Could not load showroom bays'); return; }
    state.c4.showroomBays = data || [];
    state.c4.showroomCount = (data || []).length;
  }

  async function loadWallPanels() {
    const { data, error } = await sb.from('showroom_wall_panels').select('*').order('position');
    if (error) { /* table may not exist yet — soft fail */ state.c4.wallPanels = []; return; }
    state.c4.wallPanels = data || [];
  }

  async function saveWallPanel(panelId) {
    const nameEl = document.getElementById('wp-name-' + panelId);
    const noteEl = document.getElementById('wp-note-' + panelId);
    if (!nameEl) return;
    const row = {
      id: panelId,
      name: nameEl.value.trim() || null,
      note: noteEl ? noteEl.value.trim() || null : null,
    };
    const { error } = await sb.from('showroom_wall_panels').upsert(row, { onConflict: 'id' });
    if (error) { toast('Save failed'); return; }
    toast('Wall panel saved');
    await loadWallPanels();
    render();
  }

  async function addWallPanel() {
    const pos = ((state.c4.wallPanels || []).length) + 1;
    const { data, error } = await sb.from('showroom_wall_panels').insert({ position: pos, name: null, note: null }).select().single();
    if (error) { toast('Could not add panel'); return; }
    state.c4.wallPanels = [...(state.c4.wallPanels || []), data];
    render();
  }

  async function deleteWallPanel(id) {
    if (!confirm('Remove this wall panel?')) return;
    await sb.from('showroom_wall_panels').delete().eq('id', id);
    await loadWallPanels();
    render();
  }

  async function uploadWallPanelImage(id, file) {
    if (!file) return;
    const ext = file.name.split('.').pop() || 'jpg';
    const path = id + '-' + Date.now() + '.' + ext;
    const { error: upErr } = await sb.storage.from('showroom-images').upload(path, file, { upsert: true });
    if (upErr) { toast('Image upload failed'); return; }
    const { data: urlData } = sb.storage.from('showroom-images').getPublicUrl(path);
    const publicUrl = urlData.publicUrl;
    const { error: dbErr } = await sb.from('showroom_wall_panels').update({ image_url: publicUrl }).eq('id', id);
    if (dbErr) { toast('Could not save image URL'); return; }
    const panel = (state.c4.wallPanels || []).find(p => p.id === id);
    if (panel) panel.image_url = publicUrl;
    render();
    toast('Image saved');
  }

  function renderC4Showroom() {
    const bays = state.c4.showroomBays || [];
    const editing = state.c4.showroomEditing; // bay_number being edited, or null for new

    const bayCards = bays.map(b => {
      const fields = SHOWROOM_FIELDS.map(f => {
        const key = f.toLowerCase().replace(/ /g, '_').replace(/\//g, '_');
        const val = b[key];
        const imgUrl = b[key + '_image'];
        const imgEl = imgUrl
          ? `<img class="c4-bay-img-thumb" src="${esc(imgUrl)}" alt="${esc(f)}" data-action="c4-bay-img-pick" data-bay="${esc(String(b.bay_number))}" data-field="${esc(key)}" title="Tap to change photo" />`
          : `<div class="c4-bay-img-add" data-action="c4-bay-img-pick" data-bay="${esc(String(b.bay_number))}" data-field="${esc(key)}" title="Add photo">&#128247;</div>`;
        return `
          <div class="c4-bay-field-row">
            <div class="c4-bay-field-text">
              <span>${esc(f)}</span>
              <strong>${val ? esc(val) : '<span style="color:var(--muted);font-style:italic;">Not recorded</span>'}</strong>
            </div>
            ${imgEl}
          </div>`;
      }).join('');
      return `
      <div class="c4-item-row" style="align-items:flex-start;flex-direction:column;gap:6px;">
        <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
          <div class="c4-item-name">Bay ${esc(String(b.bay_number))}</div>
          <button class="btn btn-ghost" data-action="c4-showroom-edit" data-bay="${esc(String(b.bay_number))}" style="font-size:.75rem;padding:4px 8px;">Edit</button>
        </div>
        ${fields}
      </div>`;
    }).join('');

    const isEditing = editing !== null && editing !== undefined;
    const editBay = isEditing ? bays.find(b => String(b.bay_number) === String(editing)) : null;

    const formFields = SHOWROOM_FIELDS.map(f => {
      const key = f.toLowerCase().replace(/ /g, '_').replace(/\//g, '_');
      const val = editBay ? (editBay[key] || '') : '';
      return `
        <div style="margin-bottom:8px;">
          <label style="font-size:.75rem;color:var(--text-muted);display:block;margin-bottom:3px;">${esc(f)}</label>
          <input class="text-input" type="text" id="sbay-${key}" placeholder="e.g. Kaldewei Puro 170x70" value="${esc(val)}" style="width:100%;" />
        </div>`;
    }).join('');

    const form = `
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="card-title" style="font-size:.9rem;margin-bottom:10px;">${isEditing ? 'Edit Bay ' + esc(String(editing)) : 'Record a bay'}</div>
        <div style="margin-bottom:8px;">
          <label style="font-size:.75rem;color:var(--text-muted);display:block;margin-bottom:3px;">Bay number</label>
          <input class="text-input" id="sbay-number" type="tel" inputmode="numeric" placeholder="e.g. 6" value="${isEditing ? esc(String(editing)) : ''}" style="width:90px;" ${isEditing ? 'readonly' : ''} />
        </div>
        ${formFields}
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-primary" data-action="c4-showroom-save" style="flex:1;">Save bay</button>
          ${isEditing ? `<button class="btn btn-ghost" data-action="c4-showroom-cancel" style="flex:1;">Cancel</button>` : ''}
        </div>
      </div>`;

    /* ── wall panels section ── */
    const wallPanels = state.c4.wallPanels || [];
    const wallPanelCards = wallPanels.map(p => {
      const imgEl = p.image_url
        ? `<img class="c4-wall-panel-img" src="${esc(p.image_url)}" alt="Panel image" />`
        : `<div class="c4-wall-panel-img-placeholder" data-action="c4-wp-img-pick" data-id="${esc(p.id)}">&#128247; Tap to add photo</div>`;
      return `
        <div class="c4-wall-panel-card">
          <div class="c4-wall-panel-header">
            <span class="c4-wall-panel-name">${p.name ? esc(p.name) : '<span style="color:var(--muted);font-style:italic;">Unnamed panel</span>'}</span>
            <div style="display:flex;gap:6px;">
              ${p.image_url ? `<button class="btn btn-ghost" data-action="c4-wp-img-pick" data-id="${esc(p.id)}" style="font-size:.72rem;padding:3px 8px;">&#128247; Change</button>` : ''}
              <button class="btn btn-ghost" data-action="c4-wp-delete" data-id="${esc(p.id)}" style="font-size:.72rem;padding:3px 8px;color:#dc2626;">Remove</button>
            </div>
          </div>
          <div class="c4-wall-panel-body">
            ${imgEl}
            <input class="text-input" id="wp-name-${esc(p.id)}" type="text" placeholder="Panel name / product" value="${esc(p.name || '')}" style="width:100%;" />
            <input class="text-input" id="wp-note-${esc(p.id)}" type="text" placeholder="Notes (optional)" value="${esc(p.note || '')}" style="width:100%;" />
            <button class="btn btn-primary" data-action="c4-wp-save" data-id="${esc(p.id)}" style="align-self:flex-start;">Save</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
      <div class="card">
        <div class="card-title">Showroom Bays</div>
        <p class="text-muted text-sm" style="margin-bottom:12px;">Record what's on display in each bay. Submitting a bay number overwrites the previous record for that bay.</p>
        ${bays.length ? bayCards : '<p class="text-muted text-sm">No bays recorded yet.</p>'}
        ${form}
        <div class="c4-wall-section">
          <div class="c4-wall-section-title">Showroom Wall Panels</div>
          <p class="text-muted text-sm" style="margin-bottom:12px;">Record each wall section used to showcase panel ranges. Add a photo, product name, and any notes.</p>
          ${wallPanelCards || '<p class="text-muted text-sm">No wall panels recorded yet.</p>'}
          <button class="btn btn-ghost" data-action="c4-wp-add" style="margin-top:8px;width:100%;">+ Add wall panel</button>
        </div>
      </div>
      <input type="file" id="c4-wp-img-input" accept="image/*" capture="environment" style="display:none;" />
      <input type="file" id="c4-bay-img-input" accept="image/*" capture="environment" style="display:none;" />`;
  }

  async function saveShowroomBay() {
    const bayNum = parseInt((document.getElementById('sbay-number') || {}).value || '', 10);
    if (!bayNum || isNaN(bayNum)) { toast('Enter a bay number'); return; }
    const row = { bay_number: bayNum };
    SHOWROOM_FIELDS.forEach(f => {
      const key = f.toLowerCase().replace(/ /g, '_').replace(/\//g, '_');
      const el = document.getElementById('sbay-' + key);
      row[key] = el ? (el.value.trim() || null) : null;
    });
    /* upsert on bay_number — overwrites existing record for that bay */
    const { error } = await sb.from('showroom_bays').upsert(row, { onConflict: 'bay_number' });
    if (error) { toast('Save failed — check connection'); return; }
    state.c4.showroomEditing = null;
    await loadShowroomBays();
    render();
    toast('Bay saved');
  }

  async function uploadBayFieldImage(bayNumber, fieldKey, file) {
    if (!file) return;
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = 'bay-' + bayNumber + '-' + fieldKey + '-' + Date.now() + '.' + ext;
    const { error: upErr } = await sb.storage.from('showroom-images').upload(path, file, { upsert: true });
    if (upErr) { toast('Image upload failed'); return; }
    const { data: urlData } = sb.storage.from('showroom-images').getPublicUrl(path);
    const publicUrl = urlData.publicUrl;
    const col = fieldKey + '_image';
    const { error: dbErr } = await sb.from('showroom_bays').update({ [col]: publicUrl }).eq('bay_number', bayNumber);
    if (dbErr) { toast('Could not save image URL'); return; }
    /* update local state so render reflects immediately */
    const bay = (state.c4.showroomBays || []).find(b => String(b.bay_number) === String(bayNumber));
    if (bay) bay[col] = publicUrl;
    render();
    toast('Photo saved');
  }

  /* ── derive unique option values from loaded items ── */
  function c4FilterOptions(field) {
    const items = state.c4.items || [];
    const seen = new Set();
    items.forEach(i => { if (i[field]) seen.add(i[field]); });
    return Array.from(seen).sort();
  }

  function renderC4FilterBar() {
    const f = state.c4.filters || {};
    const open = state.c4.filterOpen || false;
    const activeCount = [f.vendor, f.install_category, f.stocked, f.warehouse].filter(Boolean).length;
    const badge = activeCount > 0 ? `<span class="c4-filter-badge">${activeCount}</span>` : '';

    const vendorOpts = ['', ...c4FilterOptions('vendor')].map(v =>
      `<option value="${esc(v)}" ${f.vendor === v ? 'selected' : ''}>${v ? esc(v) : 'All vendors'}</option>`).join('');
    const installOpts = ['', ...c4FilterOptions('install_category')].map(v =>
      `<option value="${esc(v)}" ${f.install_category === v ? 'selected' : ''}>${v ? esc(v) : 'All categories'}</option>`).join('');
    const stockedOpts = [['', 'All items'], ['Yes', 'Stocked only'], ['No', 'Not stocked']].map(([val, label]) =>
      `<option value="${val}" ${(f.stocked || '') === val ? 'selected' : ''}>${label}</option>`).join('');
    const warehouseOpts = ['', ...c4FilterOptions('warehouse')].map(v =>
      `<option value="${esc(v)}" ${f.warehouse === v ? 'selected' : ''}>${v ? 'Bay ' + esc(v) : 'All locations'}</option>`).join('');

    const panel = open ? `
      <div class="c4-filter-panel">
        <div class="c4-filter-row">
          <label class="c4-filter-label">Vendor</label>
          <select class="c4-filter-select" data-action="c4-filter-change" data-field="vendor">${vendorOpts}</select>
        </div>
        <div class="c4-filter-row">
          <label class="c4-filter-label">Install Category</label>
          <select class="c4-filter-select" data-action="c4-filter-change" data-field="install_category">${installOpts}</select>
        </div>
        <div class="c4-filter-row">
          <label class="c4-filter-label">Stocked</label>
          <select class="c4-filter-select" data-action="c4-filter-change" data-field="stocked">${stockedOpts}</select>
        </div>
        <div class="c4-filter-row">
          <label class="c4-filter-label">Warehouse Location</label>
          <select class="c4-filter-select" data-action="c4-filter-change" data-field="warehouse">${warehouseOpts}</select>
        </div>
        ${activeCount > 0 ? `<button class="c4-filter-clear" data-action="c4-filter-clear">Clear all filters</button>` : ''}
      </div>` : '';

    return `<div class="c4-filter-bar">
      <button class="c4-filter-toggle" data-action="c4-filter-toggle">
        <span>&#9663; Filter</span>
        ${badge}
        <span style="margin-left:auto;font-size:.75rem;color:var(--muted);">${open ? 'Hide' : 'Show'}</span>
      </button>
      ${panel}
    </div>`;
  }

  function applyC4Filters(items) {
    const f = state.c4.filters || {};
    return items.filter(i => {
      if (f.vendor          && i.vendor           !== f.vendor)           return false;
      if (f.install_category && i.install_category !== f.install_category) return false;
      if (f.stocked         && i.stocked           !== f.stocked)          return false;
      if (f.warehouse       && i.warehouse          !== f.warehouse)        return false;
      return true;
    });
  }

  function renderC4SubCats() {
    const cat = C4_CATS.find(c => c.key === state.c4.cat);
    if (state.c4.loading) {
      return `<div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
        <div class="card"><p class="text-muted">Loading&hellip;</p></div>`;
    }
    const items = state.c4.items || [];

    /* group by sub_category, count items and counted items per group */
    const groups = {};
    items.forEach(i => {
      const g = i.sub_category || 'Other';
      if (!groups[g]) groups[g] = { total: 0, counted: 0 };
      groups[g].total++;
      if (i.current_qty !== null && i.current_qty !== undefined) groups[g].counted++;
    });
    const groupKeys = Object.keys(groups).sort();

    const rows = groupKeys.map(g => {
      const { total, counted } = groups[g];
      return `
        <div class="c4-subcat-row" data-action="c4-open-subcat" data-subcat="${esc(g)}">
          <div class="c4-subcat-name">${esc(g)}</div>
          <div class="c4-subcat-meta">
            <span class="c4-cat-count">${total} item${total !== 1 ? 's' : ''}</span>
            ${counted > 0 ? `<span class="c4-cat-count" style="background:#d1fae5;color:#059669;">${counted} counted</span>` : ''}
          </div>
          <span style="color:var(--muted);font-size:.9rem;">&#9658;</span>
        </div>`;
    }).join('');

    const totalCounted = items.filter(i => i.current_qty !== null && i.current_qty !== undefined).length;

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-overview">&#8592; Categories</button></div>
      <div class="card">
        <div class="card-title">${esc(cat ? cat.name : '')}</div>
        <p class="text-muted text-sm" style="margin-bottom:12px;">${totalCounted} of ${items.length} counted</p>
        ${rows || '<div class="text-muted text-sm">No items found.</div>'}
      </div>`;
  }

  function renderC4Category() {
    const cat = C4_CATS.find(c => c.key === state.c4.cat);
    if (state.c4.loading) {
      return `<div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-subcats">&#8592; ${esc(state.c4.subCat || 'Back')}</button></div>
        <div class="card"><p class="text-muted">Loading items&hellip;</p></div>`;
    }
    const allItems = state.c4.items || [];
    const subCat = state.c4.subCat || null;
    const inSubCat = subCat ? allItems.filter(i => (i.sub_category || 'Other') === subCat) : allItems;
    const q = (state.c4.search || '').toLowerCase().trim();
    const afterSearch = q
      ? inSubCat.filter(i => (i.name || '').toLowerCase().includes(q) || (i.sku || i.vendor_sku || '').toLowerCase().includes(q) || (i.vendor || '').toLowerCase().includes(q))
      : inSubCat;
    const filtered = applyC4Filters(afterSearch);

    /* group by sub_category */
    const groups = {};
    filtered.forEach(i => {
      const g = i.sub_category || 'Other';
      (groups[g] = groups[g] || []).push(i);
    });
    const groupKeys = Object.keys(groups).sort();

    const countedTotal = inSubCat.filter(i => i.current_qty !== null && i.current_qty !== undefined).length;

    const sections = groupKeys.map(g => {
      const rows = groups[g].map(i => {
        const isBackordered = !!i.backorder_until;
        const boTag = isBackordered
          ? `<div class="c4-bo-tag" data-action="c4-bo-open" data-id="${esc(i.id)}">Back order &mdash; due ${esc(formatDateUK(i.backorder_until))}${i.backorder_note ? `: ${esc(i.backorder_note)}` : ''}</div>`
          : `<button class="c4-bo-add" data-action="c4-bo-open" data-id="${esc(i.id)}">+ Back order</button>`;
        const boForm = state.c4.boOpenId === i.id ? `
          <div class="c4-bo-form">
            <input class="text-input" type="date" data-action="c4-bo-date" data-id="${esc(i.id)}" value="${i.backorder_until || ''}" />
            <input class="text-input" type="text" placeholder="Note (optional)" data-action="c4-bo-note" data-id="${esc(i.id)}" value="${esc(i.backorder_note || '')}" style="flex:1;" />
            <button class="btn btn-ghost" data-action="c4-bo-save" data-id="${esc(i.id)}">Save</button>
            ${isBackordered ? `<button class="btn btn-ghost" data-action="c4-bo-clear" data-id="${esc(i.id)}">Clear</button>` : ''}
          </div>` : '';
        return `
        <div class="c4-item-row${isBackordered ? ' c4-item-row-bo' : ''}${i.out_of_stock ? ' c4-item-row-oos' : ''}">
          <div class="c4-item-info">
            <div class="c4-item-name">${esc(i.name)}</div>
            ${(i.sku || i.vendor_sku) ? `<span class="item-sku">${esc(i.sku || i.vendor_sku)}</span>` : ''}
            ${i.out_of_stock ? `<span class="c4-oos-tag">Out of stock${i.oos_expected_label ? ' &mdash; ' + esc(i.oos_expected_label) : ''}</span>` : ''}
            <div class="c4-loc-pills">
              <span class="c4-loc-label">Location</span>
              ${['7','9','11','SHO','19'].map(loc => `<button class="c4-loc-pill${(i.warehouse||'') === loc ? ' active' : ''}" data-action="c4-loc" data-id="${esc(i.id)}" data-loc="${loc}">${loc}</button>`).join('')}
            </div>
            ${boTag}
            ${boForm}
          </div>
          <div class="c4-stepper">
            <button class="c4-step-btn" data-action="c4-step" data-id="${esc(i.id)}" data-dir="-1">&minus;</button>
            <input class="qty-input" type="tel" inputmode="numeric" placeholder="Qty"
              value="${i.current_qty ?? ''}"
              data-action="c4-qty-input" data-id="${esc(i.id)}" />
            <button class="c4-step-btn" data-action="c4-step" data-id="${esc(i.id)}" data-dir="1">&plus;</button>
          </div>
        </div>`;
      }).join('');
      return `<div class="c4-group">
        <div class="c4-group-title">${esc(g)}</div>
        ${rows}
      </div>`;
    }).join('') || `<div class="empty-state"><div class="icon">&#128269;</div><p>No items match</p></div>`;

    return `
      <div class="mod-back"><button class="btn btn-ghost" data-action="c4-back-subcats">&#8592; ${esc(state.c4.subCat || (cat ? cat.name : 'Back'))}</button></div>
      <div class="card">
        <div class="card-title">${esc(state.c4.subCat || (cat ? cat.name : ''))}</div>
        <p class="text-muted text-sm" style="margin-bottom:8px;">${countedTotal} of ${inSubCat.length} counted</p>
        <input class="text-input" type="text" placeholder="Search by name or SKU&hellip;"
          value="${esc(state.c4.search || '')}" data-action="c4-search" style="margin-bottom:10px;width:100%;" />
        ${renderC4FilterBar()}
        ${sections}
      </div>`;
  }

  function formatDateUK(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  let c4SaveTimers = {};
  function queueC4Save(id, qty) {
    clearTimeout(c4SaveTimers[id]);
    c4SaveTimers[id] = setTimeout(() => saveC4Qty(id, qty), 500);
  }
  async function saveC4Qty(id, qty) {
    const val = qty === '' ? null : Number(qty);
    const countedBy = state.role || 'warehouse';
    const countedAt = new Date().toISOString();
    const { error } = await sb.from('stock_items').update({
      current_qty: val,
      counted_by:  countedBy,
      counted_at:  countedAt,
    }).eq('id', id);
    if (error) { toast('Save failed — check connection'); return; }
    const item = (state.c4.items || []).find(i => i.id === id);
    if (item) item.current_qty = val;
    /* count history — append only, never blocks the main save if it fails */
    sb.from('stock_count_log').insert({ item_id: id, qty: val, counted_by: countedBy, counted_at: countedAt });
  }

  async function saveC4Location(id, loc) {
    const item = (state.c4.items || []).find(i => i.id === id);
    if (!item) return;
    /* toggle off if already selected */
    const newVal = item.warehouse === loc ? null : loc;
    const { error } = await sb.from('stock_items').update({ warehouse: newVal }).eq('id', id);
    if (error) { toast('Save failed — check connection'); return; }
    item.warehouse = newVal;
    render();
  }

  function stepC4Qty(id, dir) {
    const item = (state.c4.items || []).find(i => i.id === id);
    if (!item) return;
    const current = Number(item.current_qty) || 0;
    const next = Math.max(0, current + dir);
    item.current_qty = next;
    render();
    saveC4Qty(id, String(next));
  }

  function toggleBoForm(id) {
    state.c4.boOpenId = state.c4.boOpenId === id ? null : id;
    render();
  }

  async function saveBackorder(id) {
    const dateEl = document.querySelector(`[data-action="c4-bo-date"][data-id="${id}"]`);
    const noteEl = document.querySelector(`[data-action="c4-bo-note"][data-id="${id}"]`);
    const dateVal = dateEl ? dateEl.value : '';
    const noteVal = noteEl ? noteEl.value.trim() : '';
    if (!dateVal) { toast('Pick a date first'); return; }
    const { error } = await sb.from('stock_items').update({
      backorder_until: dateVal,
      backorder_note: noteVal || null,
      backorder_logged_by: state.role || 'office',
      backorder_logged_at: new Date().toISOString(),
    }).eq('id', id);
    if (error) { toast('Save failed — check connection'); return; }
    const item = (state.c4.items || []).find(i => i.id === id);
    if (item) { item.backorder_until = dateVal; item.backorder_note = noteVal || null; }
    state.c4.boOpenId = null;
    render();
    toast('Back order logged');
  }

  async function clearBackorder(id) {
    const { error } = await sb.from('stock_items').update({
      backorder_until: null, backorder_note: null,
    }).eq('id', id);
    if (error) { toast('Save failed — check connection'); return; }
    const item = (state.c4.items || []).find(i => i.id === id);
    if (item) { item.backorder_until = null; item.backorder_note = null; }
    state.c4.boOpenId = null;
    render();
  }

  /* ═══════════════════════════════════════════════
     EVENT BINDING (drag-and-drop for M1)
  ═══════════════════════════════════════════════ */
  function bindEvents() {
    const dz = document.getElementById('drop-zone');
    if (dz) {
      dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
      dz.addEventListener('drop', e => {
        e.preventDefault();
        dz.classList.remove('drag-over');
        handleFiles([...e.dataTransfer.files].filter(f => f.type === 'application/pdf'));
      });
    }
  }

  /* ═══════════════════════════════════════════════
     GLOBAL CLICK HANDLER
  ═══════════════════════════════════════════════ */
  document.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    /* ── navigation ── */
    if (action === 'open-module') {
      stopSnake();
      const mod = btn.dataset.mod;
      state.module = mod;
      if (mod === 'verifier')   { state.view = 'upload'; }
      if (mod === 'completion') { state.view = 'c2-home'; }
      if (mod === 'delivery')   { state.view = 'c3-home'; }
      if (mod === 'stock')      { state.view = 'c4-overview'; Promise.all([loadC4Counts(), loadMiscItems(), loadShowroomBays(), loadWallPanels(), loadC4EOLItems()]).then(render); }
      render(); return;
    }
    /* ── upload-cancel: clears staging/append state, returns home without wiping M2/M3 ── */
    if (action === 'upload-cancel') {
      state.stagedFiles       = [];
      state.appendTarget      = null;
      state.dupWarnings       = [];
      state.dupPendingJobObjs = null;
      state.module = 'home'; state.view = 'home';
      state.dash = { loading: true, m1: [], m2: [], m3: [] };
      render(); return;
    }
    if (action === 'stock-oos-open') {
      state.dash.oosOpen = true;
      state.dash.oosSearch = '';
      const dashEl = document.getElementById('dashboard');
      if (dashEl) dashEl.innerHTML = renderDashboardContent();
      return;
    }
    if (action === 'stock-oos-close') {
      state.dash.oosOpen = false;
      const dashEl = document.getElementById('dashboard');
      if (dashEl) dashEl.innerHTML = renderDashboardContent();
      return;
    }
    if (action === 'stock-oos-mark-open') {
      openOosMarkForm(btn.dataset.id);
      return;
    }
    if (action === 'stock-oos-mark-cancel') {
      closeOosMarkForm();
      return;
    }
    if (action === 'stock-oos-confirm') {
      confirmOosMark(btn.dataset.id);
      return;
    }
    if (action === 'stock-toggle-oos') {
      toggleOosItem(btn.dataset.id, btn.dataset.current === '1');
      return;
    }
    if (action === 'stock-add-open') {
      state.dash.addItemOpen = true;
      const dashEl = document.getElementById('dashboard');
      if (dashEl) dashEl.innerHTML = renderDashboardContent();
      return;
    }
    if (action === 'stock-add-cancel') {
      state.dash.addItemOpen = false;
      const dashEl = document.getElementById('dashboard');
      if (dashEl) dashEl.innerHTML = renderDashboardContent();
      return;
    }
    if (action === 'stock-add-save') {
      saveStockAddItem();
      return;
    }
    if (action === 'c4-step') {
      stepC4Qty(btn.dataset.id, Number(btn.dataset.dir));
      return;
    }
    if (action === 'c4-loc') {
      saveC4Location(btn.dataset.id, btn.dataset.loc);
      return;
    }
    if (action === 'c4-open-showroom') {
      state.view = 'c4-showroom';
      state.c4.showroomEditing = null;
      loadWallPanels().then(render);
      render();
      loadShowroomBays().then(render);
      return;
    }
    if (action === 'c4-showroom-edit') {
      state.c4.showroomEditing = btn.dataset.bay;
      render();
      return;
    }
    if (action === 'c4-showroom-cancel') {
      state.c4.showroomEditing = null;
      render();
      return;
    }
    if (action === 'c4-showroom-save') {
      saveShowroomBay();
      return;
    }
    if (action === 'c4-bay-img-pick') {
      const fileInput = document.getElementById('c4-bay-img-input');
      if (fileInput) {
        fileInput._bay   = btn.dataset.bay;
        fileInput._field = btn.dataset.field;
        fileInput.click();
      }
      return;
    }
    if (action === 'c4-wp-add') {
      addWallPanel();
      return;
    }
    if (action === 'c4-wp-save') {
      saveWallPanel(btn.dataset.id);
      return;
    }
    if (action === 'c4-wp-delete') {
      deleteWallPanel(btn.dataset.id);
      return;
    }
    if (action === 'c4-wp-img-pick') {
      const fileInput = document.getElementById('c4-wp-img-input');
      if (fileInput) {
        fileInput._panelId = btn.dataset.id;
        fileInput.click();
      }
      return;
    }
    if (action === 'c4-open-eol') {
      state.view = 'c4-eol';
      state.c4.eolExpanded = {};
      render();
      loadC4EOLItems().then(render);
      return;
    }
    if (action === 'c4-eol-toggle') {
      const g = btn.dataset.group;
      state.c4.eolExpanded = state.c4.eolExpanded || {};
      state.c4.eolExpanded[g] = !state.c4.eolExpanded[g];
      render();
      return;
    }
    if (action === 'c4-open-misc') {
      state.view = 'c4-misc';
      state.c4.miscLoc = null;
      render();
      loadMiscItems().then(render);
      return;
    }
    if (action === 'c4-misc-loc') {
      const picked = btn.dataset.loc;
      state.c4.miscLoc = state.c4.miscLoc === picked ? null : picked;
      document.querySelectorAll('[data-action="c4-misc-loc"]').forEach(b => {
        b.classList.toggle('active', b.dataset.loc === state.c4.miscLoc);
      });
      return;
    }
    if (action === 'c4-misc-save') {
      saveMiscItem();
      return;
    }
    if (action === 'c4-misc-delete') {
      deleteMiscItem(btn.dataset.id);
      return;
    }
    if (action === 'c4-bo-open') {
      toggleBoForm(btn.dataset.id);
      return;
    }
    if (action === 'c4-bo-save') {
      saveBackorder(btn.dataset.id);
      return;
    }
    if (action === 'c4-bo-clear') {
      clearBackorder(btn.dataset.id);
      return;
    }
    if (action === 'c4-filter-toggle') {
      state.c4.filterOpen = !state.c4.filterOpen;
      render();
      return;
    }
    if (action === 'c4-filter-clear') {
      state.c4.filters = {};
      render();
      return;
    }
    if (action === 'c4-open-cat') {
      state.c4.cat = btn.dataset.cat;
      state.c4.items = [];
      state.c4.search = '';
      state.c4.subCat = null;
      state.c4.filters = {};
      state.c4.filterOpen = false;
      state.view = 'c4-subcats';
      render();
      await loadC4Items(btn.dataset.cat);
      render();
      return;
    }
    if (action === 'c4-open-subcat') {
      state.c4.subCat = btn.dataset.subcat;
      state.c4.search = '';
      state.view = 'c4-category';
      render();
      return;
    }
    if (action === 'c4-back-subcats') {
      state.c4.subCat = null;
      state.c4.search = '';
      state.view = 'c4-subcats';
      render();
      return;
    }
    if (action === 'c4-back-overview') {
      state.c4.counts = null; /* refresh counts */
      state.c4.subCat = null;
      state.view = 'c4-overview';
      render();
      await loadC4Counts();
      render();
      return;
    }
    if (action === 'go-home') {
      state.module = 'home'; state.view = 'home';
      state.dash = { loading: true, m1: [], m2: [], m3: [] };
      state.c2 = { session: null, selectedJob: null, picks: {}, loading: false };
      state.c3 = { jobRef: '', items: [], delivered: {}, driverName: state.c3.driverName, loading: false, session: null };
      state.catExpanded = {};
      state.catSubmitted = {};
      state.dupWarnings = [];
      state.altModal = null;
      state.alternatives = {};
      state.driveFileDocs = [];
      state.appendTarget = null;
      render(); return;
    }

    if (action === 'dash-refresh')  { loadDashboard(); return; }
    if (action === 'copy-dash-m1') { copyDashM1(); return; }
    if (action === 'copy-dash-m2') { copyDashM2(); return; }
    if (action === 'copy-dash-m3') { copyDashM3(); return; }
    if (action === 'dash-unlock') { tryDashUnlock(); return; }

    /* ── dashboard module-level collapse ── */
    if (action === 'dash-module-toggle') {
      const mod = btn.closest('[data-module]')?.dataset.module || btn.dataset.module;
      state.dashModuleExpanded[mod] = !state.dashModuleExpanded[mod];
      const body    = document.querySelector(`.dash-module-body[data-module="${mod}"]`);
      const chevron = document.querySelector(`.dash-module-chevron[data-module="${mod}"]`);
      if (body)    body.classList.toggle('open', state.dashModuleExpanded[mod]);
      if (chevron) chevron.classList.toggle('open', state.dashModuleExpanded[mod]);
      return;
    }

    /* ── dashboard session expand/collapse ── */
    if (action === 'dash-expand') {
      const key = btn.dataset.key;
      state.dashExpanded[key] = !state.dashExpanded[key];
      /* toggle DOM directly to avoid full re-render */
      const body = document.querySelector(`.dash-session-body[data-key="${key}"]`);
      const chevron = document.querySelector(`.dash-session-chevron[data-key="${key}"]`);
      if (body)    body.classList.toggle('open', state.dashExpanded[key]);
      if (chevron) chevron.classList.toggle('open', state.dashExpanded[key]);
      return;
    }

    /* ── dashboard archive actions ── */
    if (action === 'alt-approve') {
      const { id, session: sessionId, key, altname, altsku, qty } = btn.dataset;
      /* Update alternatives row to approved */
      const { error: e1 } = await sb.from('alternatives').update({ status: 'approved', updated_at: new Date().toISOString() }).eq('id', id);
      if (e1) { toast('Could not approve — try again'); console.error(e1); return; }
      /* Add the alternative as a new item in the session master_list */
      const { data: sess } = await sb.from('sessions').select('master_list').eq('id', sessionId).single();
      if (sess) {
        const ml = sess.master_list || [];
        const newKey = altsku ? altsku.toUpperCase() : 'ALT-' + key;
        if (!ml.find(i => i.key === newKey)) {
          ml.push({ key: newKey, name: altname || altsku, sku: altsku || '', qty: Number(qty) || 1, unit: 'pcs', fromBundle: null, jobs: [], jobQtys: {}, isAlternative: true, replacesKey: key });
          await sb.from('sessions').update({ master_list: ml }).eq('id', sessionId);
        }
      }
      toast('✓ Alternative approved and added to pick list');
      loadDashboard(); return;
    }
    if (action === 'alt-reject') {
      const { id } = btn.dataset;
      const { error } = await sb.from('alternatives').update({ status: 'rejected', updated_at: new Date().toISOString() }).eq('id', id);
      if (error) { toast('Could not reject — try again'); console.error(error); return; }
      toast('Alternative rejected');
      loadDashboard(); return;
    }
    if (action === 'dash-archive-session') {
      e.stopPropagation();
      const code = btn.dataset.code;
      if (!confirm(`Archive session ${code}? It will disappear from this dashboard.`)) return;
      const { error } = await sb.from('sessions').update({ archived: true }).eq('code', code);
      if (error) { toast('Archive failed'); console.error(error); return; }
      toast('Session archived');
      loadDashboard();
      return;
    }

    if (action === 'dash-archive-m2') {
      e.stopPropagation();
      const job = btn.dataset.job;
      if (!confirm(`Archive pick shortfalls for job ${job}?`)) return;
      /* Delete all pick_completions shortfall rows for this job ref.
         job_ref may be stored with Q prefix or plain — try both. */
      const { error } = await sb.from('pick_completions').delete()
        .or(`job_ref.eq.${job},job_ref.eq.Q${job},job_ref.ilike.${job} %`);
      if (error) { toast('Archive failed'); console.error(error); return; }
      toast('Pick shortfalls archived');
      loadDashboard();
      return;
    }

    if (action === 'dash-archive-m3') {
      e.stopPropagation();
      const job = btn.dataset.job;
      if (!confirm(`Archive delivery shortfalls for job ${job}?`)) return;
      const { error } = await sb.from('deliveries').delete()
        .or(`job_ref.eq.${job},job_ref.eq.Q${job},job_ref.ilike.${job} %`);
      if (error) { toast('Archive failed'); console.error(error); return; }
      toast('Delivery shortfalls archived');
      loadDashboard();
      return;
    }

    /* ── module 1 ── */
    if (action === 'browse-files') { document.getElementById('file-input').click(); return; }
    if (action === 'drive-pick')   { handleDrivePick(); return; }
    if (action === 'dup-skip') {
      /* Log each skipped dupe to audit_log then proceed with non-dup jobs only */
      const warnings = state.dupWarnings || [];
      const dupRefs  = new Set(warnings.map(w => String(w.quoteRef).toUpperCase()));
      for (const w of warnings) {
        await sb.from('audit_log').insert({
          event: 'duplicate_skipped',
          detail: JSON.stringify({ quote_ref: w.quoteRef, existing_code: w.existingCode, existing_date: w.existingDate }),
          created_at: new Date().toISOString(),
        });
      }
      const jobObjs = (state.dupPendingJobObjs || []).filter(j => !dupRefs.has(String(j.id).toUpperCase()));
      state.dupWarnings = [];
      state.dupPendingJobObjs = null;
      if (!jobObjs.length) {
        toast('All files in this batch were duplicates — nothing to upload');
        state.stagedFiles = [];
        render(); return;
      }
      const masterList = buildMasterList(jobObjs);
      const session = await createSession(masterList, jobObjs.map(j => j.id));
      state.session = session; state.checks = {};
      state.stagedFiles = [];
      state.view = 'session';
      render(); return;
    }
    if (action === 'dup-cancel') {
      state.dupWarnings = [];
      state.dupPendingJobObjs = null;
      render(); return;
    }
    if (action === 'dup-continue') {
      /* Log each override to audit_log */
      const warnings = state.dupWarnings || [];
      for (const w of warnings) {
        await sb.from('audit_log').insert({
          event: 'duplicate_override',
          detail: JSON.stringify({ quote_ref: w.quoteRef, existing_code: w.existingCode, existing_date: w.existingDate }),
          created_at: new Date().toISOString(),
        });
      }
      /* Proceed with session creation using the pending parsed jobs */
      const jobObjs = state.dupPendingJobObjs || [];
      state.dupWarnings = [];
      state.dupPendingJobObjs = null;
      const masterList = buildMasterList(jobObjs);
      const session = await createSession(masterList, jobObjs.map(j => j.id));
      state.session = session; state.checks = {};
      state.stagedFiles = [];
      state.view = 'session';
      render(); return;
    }
    if (action === 'stage-remove') {
      const idx = parseInt(btn.dataset.idx, 10);
      state.stagedFiles.splice(idx, 1);
      render(); return;
    }
    if (action === 'stage-create') { processStaged(); return; }
    /* ── append dupe decision handlers ── */
    if (action === 'append-dup-cancel') {
      state.appendDupWarnings    = [];
      state.appendPendingJobObjs = null;
      render(); return;
    }
    if (action === 'append-dup-skip') {
      /* remove the duplicate jobs, merge only the genuinely new ones */
      const dupSet = new Set(state.appendDupWarnings.map(w => String(w).toUpperCase().trim()));
      const clean  = (state.appendPendingJobObjs || []).filter(j => !dupSet.has(String(j.id).toUpperCase().trim()));
      state.appendDupWarnings    = [];
      state.appendPendingJobObjs = null;
      if (!clean.length) { toast('Nothing new to merge after skipping duplicates'); render(); return; }
      await doAppendMerge(clean); return;
    }
    if (action === 'append-dup-continue') {
      const jobObjs = state.appendPendingJobObjs || [];
      state.appendDupWarnings    = [];
      state.appendPendingJobObjs = null;
      await doAppendMerge(jobObjs); return;
    }
    if (action === 'append-load') {
      const raw = document.getElementById('append-code')?.value.trim();
      if (!raw) { toast('Enter a session code'); return; }
      const code = raw.toUpperCase().replace(/[\s\-]/g, '');
      const tryCode = async (c) => sb.from('sessions').select('*').eq('code', c).single();
      let { data, error } = await tryCode(code);
      if (error || !data) {
        const dashed = code.replace(/^(AB)(\d{4})(.+)$/, '$1-$2-$3');
        if (dashed !== code) { const r = await tryCode(dashed); data = r.data; error = r.error; }
      }
      if (error || !data) { toast('Session not found — check the code'); return; }
      state.appendTarget = { id: data.id, code: data.code, masterList: data.master_list || [], jobs: data.jobs || [] };
      toast('Session loaded — now upload the PDFs to merge');
      render(); return;
    }
    if (action === 'append-clear') {
      state.appendTarget = null; render(); return;
    }
    if (action === 'append-submit') { appendToSession(); return; }
    if (action === 'join-session') {
      const raw = document.getElementById('join-code').value.trim();
      const code = raw.toUpperCase().replace(/[\s\-]/g, '');
      if (code) joinSession(code); return;
    }
    if (action === 'copy-code')   { navigator.clipboard.writeText(state.session.code).then(() => toast('Code copied!')); return; }
    if (action === 'go-check')    { state.view = 'check';  render(); return; }
    if (action === 'back-to-session') { state.view = 'session'; render(); return; }
    if (action === 'go-report')   { state.view = 'report'; render(); return; }
    if (action === 'back-upload') { state.view = 'upload'; render(); return; }
    if (action === 'new-session') { state.session = null; state.checks = {}; state.stagedFiles = []; state.view = 'upload'; render(); return; }
    if (action === 'tab')         { state.tab = btn.dataset.tab; render(); return; }
    if (action === 'toggle-cat')  {
      const cat = btn.dataset.cat;
      if (!state.catExpanded) state.catExpanded = {};
      /* default is open (undefined = open), so toggle to explicit false/true */
      state.catExpanded[cat] = state.catExpanded[cat] === true ? false : true;
      const body    = btn.closest('.cat-section')?.querySelector('.cat-body');
      const chevron = btn.querySelector('div:last-child');
      if (body)    body.style.display = state.catExpanded[cat] === true ? '' : 'none';
      if (chevron) chevron.style.transform = state.catExpanded[cat] === true ? '' : 'rotate(-90deg)';
      return;
    }
    if (action === 'open-alt') {
      state.altModal = { key: btn.dataset.key, name: btn.dataset.name, qty: btn.dataset.qty };
      render(); return;
    }
    if (action === 'alt-close') { state.altModal = null; render(); return; }
    if (action === 'alt-clear') {
      const key = state.altModal?.key;
      if (key) delete state.alternatives[key];
      state.altModal = null; render(); return;
    }
    if (action === 'alt-save') {
      const altName = document.getElementById('alt-name-input')?.value.trim() || '';
      const altSku  = document.getElementById('alt-sku-input')?.value.trim() || '';
      const errEl   = document.getElementById('alt-error');
      if (!altName && !altSku) {
        if (errEl) errEl.textContent = 'Enter an item name or SKU before saving.';
        return;
      }
      const key = state.altModal.key;
      if (!state.alternatives) state.alternatives = {};
      state.alternatives[key] = { altName, altSku };
      /* Save to Supabase alternatives table */
      if (state.session?.id && state.session.id !== 'local') {
        const item = state.session.masterList.find(i => i.key === key) || {};
        await sb.from('alternatives').insert({
          session_id: state.session.id,
          item_key:   key,
          item_name:  item.name || key,
          alt_name:   altName || null,
          alt_sku:    altSku  || null,
          qty:        item.qty || null,
          status:     'pending',
          updated_at: new Date().toISOString(),
        });
      }
      state.altModal = null;
      toast('Alternative saved');
      render(); return;
    }
    if (action === 'submit-cat') {
      const cat = btn.dataset.cat;
      if (!state.catSubmitted) state.catSubmitted = {};
      state.catSubmitted[cat] = !state.catSubmitted[cat];
      render(); return;
    }
    if (action === 'submit-all') { submitAllChecks(); return; }
    if (action === 'set-status')  { setStatus(btn.dataset.key, btn.dataset.status); return; }
    if (action === 'copy-report') { copyReport(); return; }

    /* ── module 2 ── */
    if (action === 'c2-load')       { loadC2Session(); return; }
    if (action === 'c2-select-job') { state.c2.selectedJob = btn.dataset.job; state.view = 'c2-pick'; render(); return; }
    if (action === 'c2-back-jobs')  { state.view = 'c2-jobs'; render(); return; }
    if (action === 'c2-submit')     { submitC2Picks(); return; }
    if (action === 'c2-copy-short') { copyC2Shortfall(); return; }

    /* ── module 3 ── */
    if (action === 'c3-load') { loadC3Job(); return; }
    if (action === 'c3-back') {
      state.c3 = { jobRef: '', items: [], delivered: {}, driverName: state.c3.driverName, loading: false, session: null };
      state.view = 'c3-home'; render(); return;
    }
    if (action === 'c3-status') {
      const key = btn.dataset.key; const status = btn.dataset.status;
      if (state.c3.delivered[key]?.status === status) { delete state.c3.delivered[key]; }
      else { state.c3.delivered[key] = { status, deliveredQty: state.c3.delivered[key]?.deliveredQty }; }
      render(); return;
    }
    if (action === 'c3-submit')  { submitC3Delivery(); return; }
    if (action === 'c3-another') {
      state.c3 = { jobRef: '', items: [], delivered: {}, driverName: state.c3.driverName, loading: false, session: null };
      state.view = 'c3-home'; render(); return;
    }
  });

     GLOBAL CHANGE + KEYDOWN HANDLERS
  ═══════════════════════════════════════════════ */
  document.addEventListener('input', e => {
    if (e.target.id === 'c4-bay-img-input') {
      const file = e.target.files && e.target.files[0];

      const field = e.target._field;

    }
    if (e.target.id === 'c4-wp-img-input') {
      const file = e.target.files && e.target.files[0];
      const id = e.target._panelId;
      if (file && id) uploadWallPanelImage(id, file);
      e.target.value = '';
      return;
    }
    if (e.target.dataset.action === 'c4-filter-change') {
      state.c4.filters = state.c4.filters || {};
      state.c4.filters[e.target.dataset.field] = e.target.value || '';
      render();
      return;
    }
    if (e.target.dataset.action === 'c4-search') {
      state.c4.search = e.target.value;
      state.c4.searchFocused = true;
      render();
    }
    if (e.target.dataset.action === 'stock-oos-search') {
      state.dash.oosSearch = e.target.value;
      const dashEl = document.getElementById('dashboard');
      if (dashEl) {
        dashEl.innerHTML = renderDashboardContent();
        const s = dashEl.querySelector('[data-action="stock-oos-search"]');
        if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
      }
